<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>爆旋陀螺 · 天馬戰榜 | 香港排名</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* 完整 CSS (與你提供的相同，此處省略重複，實際請保留你原有的完整樣式) */
        /* 為節省篇幅，此處僅展示關鍵樣式，實際使用時請保留你原來的完整 <style> 內容 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(145deg, #f0f4fc 0%, #e6edf6 100%); font-family: system-ui, 'Segoe UI', sans-serif; }
        .container { max-width: 1200px; margin: 0 auto; padding: 16px 12px; position: relative; z-index: 2; }
        /* ... 其餘樣式請從你提供的代碼中複製完整 style 區塊 ... */
        .loading-spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 6px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e2a3a; color: white; padding: 10px 20px; border-radius: 40px; font-size: 0.8rem; z-index: 3000; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>
<div class="container">
    <!-- 頂欄 -->
    <div class="navbar">
        <div class="logo-area">
            <h1><i class="fas fa-bezier-curve"></i> 天馬陀螺戰榜</h1>
            <p>香港街頭對戰 · 即時排名</p>
        </div>
        <button class="menu-btn" id="menuToggleBtn"><span></span><span></span><span></span></button>
    </div>

    <!-- 側邊選單 -->
    <div class="side-menu" id="sideMenu">
        <div class="menu-header">
            <div class="user-icon-large" id="sideUserAvatar">🏆</div>
            <div id="sideUserName">訪客</div>
        </div>
        <ul class="menu-items">
            <li><a id="loginMenuItem"><i class="fas fa-sign-in-alt"></i> 登入 / 註冊</a></li>
            <li><a id="myProfileMenuItem"><i class="fas fa-id-card"></i> 我的檔案</a></li>
            <li><a id="battleHistoryMenuItem"><i class="fas fa-history"></i> 對戰紀錄</a></li>
            <li><a id="scanBattleMenuItem"><i class="fas fa-qrcode"></i> 掃碼對戰</a></li>
            <li><a id="rulesMenuItem"><i class="fas fa-info-circle"></i> 排行榜說明</a></li>
        </ul>
    </div>
    <div class="overlay" id="overlay"></div>

    <!-- 搜尋列 -->
    <div class="search-bar">
        <input type="text" class="search-input" id="searchInput" placeholder="玩家名稱 或 數字ID">
        <button class="search-btn" id="searchBtn"><i class="fas fa-search"></i> 搜尋</button>
        <button class="clear-btn" id="clearSearchBtn"><i class="fas fa-times"></i> 清除</button>
    </div>
    <div id="searchResultInfo" class="search-result-info"></div>

    <div class="dashboard">
        <!-- 排名榜 -->
        <div class="rank-panel">
            <div class="panel-header">
                <h2><i class="fas fa-trophy"></i> 戰士排行</h2>
                <div class="pagination-info" id="paginationInfo">-</div>
            </div>
            <div class="table-wrapper">
                <table class="rank-table" id="rankTable">
                    <thead><tr><th>排名</th><th>戰士</th><th>積分</th><th>連勝</th><th>戰績</th></tr></thead>
                    <tbody id="rankTbody"><tr><td colspan="5">載入中...</td></tr></tbody>
                </table>
            </div>
            <div class="pagination" id="paginationControls"></div>
        </div>

        <!-- 約戰大廳 -->
        <div class="battle-lobby">
            <div class="lobby-header"><i class="fas fa-users"></i> 約戰大廳</div>
            <button class="create-room-btn" id="createRoomBtn"><i class="fas fa-plus-circle"></i> 開設陀螺房間</button>
            <div class="room-list" id="roomList">載入中...</div>
        </div>

        <!-- 規則資訊 -->
        <div class="info-panel">
            <div class="info-block">
                <h3><i class="fas fa-dice-d6"></i> 積分規則</h3>
                <ul class="rule-list">
                    <li><i class="fas fa-star"></i> 初始1000分</li>
                    <li><i class="fas fa-bolt"></i> 勝者奪敗者10% (上限150)</li>
                    <li><i class="fas fa-shield-alt"></i> 新手保護 ≤500分扣5%</li>
                    <li><i class="fas fa-clock"></i> 同一對手24hr一次</li>
                    <li><i class="fas fa-fire"></i> 連勝加成: 3連勝+2%</li>
                </ul>
                <div class="stat-badge">
                    <div class="stat-number" id="totalPlayersCount">0</div>
                    <div>活躍鬥士</div>
                    <div class="double-stats">
                        <div class="stat-item"><div class="stat-number" id="highestStreak">0</div><div>最高連勝</div></div>
                        <div class="stat-item"><div class="stat-number" id="weeklyChampion">-</div><div>陀螺王</div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer><i class="fas fa-bezier-curve"></i> 香港爆旋陀螺協會 · 公平競技</footer>
</div>

<!-- 玩家詳細 Popup -->
<div class="popup-overlay" id="popupOverlay">
    <div class="popup-container">
        <div class="popup-header"><h3 id="popupName">玩家</h3><button class="popup-close" id="popupCloseBtn">&times;</button></div>
        <div class="popup-body" id="popupBody"></div>
    </div>
</div>

<!-- 登入/註冊 Modal -->
<div class="modal-overlay" id="authModal">
    <div class="modal-container">
        <div class="modal-header"><h3>帳號</h3><button class="modal-close" id="closeAuthBtn">&times;</button></div>
        <div class="modal-body">
            <div class="tab-buttons">
                <button class="tab-btn active" id="loginTabBtn">登入</button>
                <button class="tab-btn" id="registerTabBtn">註冊</button>
            </div>
            <div id="loginForm">
                <div class="form-group"><label>玩家ID (5位數字)</label><input type="text" id="loginId" placeholder="例如 12345" maxlength="5"></div>
                <div class="form-group"><label>密碼</label><input type="password" id="loginPassword" placeholder="密碼"></div>
                <button id="doLoginBtn" style="width:100%; background:#2c6e9e; color:white; padding:10px; border:none; border-radius:40px;">登入</button>
                <div style="margin-top:12px; text-align:center;"><button id="googleLoginBtn" style="background:#4285F4; color:white; border:none; border-radius:40px; padding:8px 16px;"><i class="fab fa-google"></i> Google 登入</button></div>
                <div class="login-hint" style="font-size:0.7rem; text-align:center; margin-top:12px;">未註冊？請切換至「註冊」建立新帳號</div>
            </div>
            <div id="registerForm" style="display:none;">
                <div class="form-group"><label>戰士名稱</label><input type="text" id="regName" placeholder="例如 天馬戰士"></div>
                <div class="form-group"><label>活躍區域</label><select id="regDistrict"><option>觀塘區</option><option>油尖旺區</option><option>深水埗區</option><option>九龍城區</option><option>黃大仙區</option><option>葵青區</option><option>荃灣區</option><option>屯門區</option><option>元朗區</option><option>北區</option><option>大埔區</option><option>沙田區</option><option>西貢區</option><option>離島區</option><option>南區</option><option>東區</option><option>灣仔區</option><option>中西區</option></select></div>
                <div class="form-group"><label>密碼</label><input type="password" id="regPassword" placeholder="密碼"></div>
                <div class="form-group"><label>頭像 (Emoji 或 上傳)</label><div class="emoji-grid" id="regEmojiGrid"></div><label for="regAvatarUpload" style="background:#eef2f8; display:inline-block; padding:6px 12px; border-radius:40px; cursor:pointer;">上傳圖片</label><input type="file" id="regAvatarUpload" accept="image/*" style="display:none;"><div id="regAvatarPreview" style="margin-top:8px; width:50px; height:50px; border-radius:50%; background:#eef2f8; display:flex; align-items:center; justify-content:center; font-size:1.8rem;">🏆</div></div>
                <button id="doRegisterBtn" style="width:100%; background:#2c6e9e; color:white; padding:10px; border:none; border-radius:40px;">註冊新帳號</button>
                <div style="margin-top:12px; text-align:center;"><button id="regGoogleBtn" style="background:#4285F4; color:white; border:none; border-radius:40px; padding:8px 16px;"><i class="fab fa-google"></i> 使用 Google 註冊</button></div>
            </div>
        </div>
    </div>
</div>

<!-- 編輯檔案 Modal -->
<div class="modal-overlay" id="profileModal">
    <div class="modal-container">
        <div class="modal-header"><h3>編輯我的檔案</h3><button class="modal-close" id="closeProfileBtn">&times;</button></div>
        <div class="modal-body">
            <div class="emoji-grid" id="profileEmojiGrid"></div>
            <div class="upload-area"><label for="profileAvatarUpload" style="background:#eef2f8; display:inline-block; padding:6px 12px; border-radius:40px; cursor:pointer;">上傳圖片</label><input type="file" id="profileAvatarUpload" accept="image/*" style="display:none;"><div id="profileAvatarPreview" style="margin:10px auto; width:60px; height:60px; border-radius:50%; background:#eef2f8; display:flex; align-items:center; justify-content:center; overflow:hidden;"></div></div>
            <select id="profileDistrict" style="width:100%; padding:10px; margin-top:12px; border-radius:40px;"><option>觀塘區</option><option>油尖旺區</option><option>深水埗區</option><option>九龍城區</option><option>黃大仙區</option><option>葵青區</option><option>荃灣區</option><option>屯門區</option><option>元朗區</option><option>北區</option><option>大埔區</option><option>沙田區</option><option>西貢區</option><option>離島區</option><option>南區</option><option>東區</option><option>灣仔區</option><option>中西區</option></select>
            <button id="saveProfileBtn" style="width:100%; margin-top:16px; background:#1e5a88; color:white; padding:10px; border:none; border-radius:40px;">儲存變更</button>
        </div>
    </div>
</div>

<div id="toastMessage" class="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, getDoc, getDocs, query, orderBy, limit, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyALCq_eK__C_YD-MgMeQAL1enqeMF4hQG4",
        authDomain: "goshoot-ac397.firebaseapp.com",
        projectId: "goshoot-ac397",
        storageBucket: "goshoot-ac397.firebasestorage.app",
        messagingSenderId: "251450080441",
        appId: "1:251450080441:web:613567f18a19a828bcef68",
        measurementId: "G-25J4M3QZPN"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // ---------- 全域變數 ----------
    let currentUser = null;
    let allPlayers = [];
    let filteredPlayers = [];
    let currentPage = 1;
    const itemsPerPage = 15;
    let currentSearchTerm = "";
    let selectedRegAvatar = "🏆";
    let selectedProfileAvatar = null;

    // DOM 元素 (延遲初始化)
    let rankTbody, searchInput, searchBtn, clearBtn, paginationControls, paginationInfo;
    let totalPlayersSpan, highestStreakSpan, weeklyChampionSpan;
    let sideUserAvatar, sideUserName, loginMenuItem;
    let authModal, loginForm, registerForm, loginIdInput, loginPasswordInput, doLoginBtn, googleLoginBtn;
    let regNameInput, regDistrictSelect, regPasswordInput, doRegisterBtn, regGoogleBtn;
    let profileModal, profileAvatarPreview, profileDistrictSelect, saveProfileBtn;
    let popupOverlay, popupName, popupBody, popupCloseBtn;
    let createRoomBtn, roomList;

    // 輔助函數
    function showToast(msg, isError = false) {
        const toast = document.getElementById("toastMessage");
        if (!toast) return;
        toast.textContent = msg;
        toast.style.background = isError ? "#c0392b" : "#1e2a3a";
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 3000);
    }

    function setButtonLoading(btn, isLoading) {
        if (!btn) return;
        if (isLoading) {
            btn.dataset.originalText = btn.innerHTML;
            btn.innerHTML = '<span class="loading-spinner"></span> 處理中';
            btn.disabled = true;
        } else {
            btn.innerHTML = btn.dataset.originalText || btn.innerHTML;
            btn.disabled = false;
        }
    }

    // ---------- Firebase 玩家資料同步 ----------
    async function getOrCreatePlayer(firebaseUser) {
        const playerRef = doc(db, "players", firebaseUser.uid);
        const docSnap = await getDoc(playerRef);
        if (docSnap.exists()) {
            return { id: firebaseUser.uid, ...docSnap.data() };
        } else {
            const numericId = Math.floor(10000 + Math.random() * 90000);
            const displayName = firebaseUser.displayName || (firebaseUser.email ? firebaseUser.email.split('@')[0] : "新戰士");
            const newPlayer = {
                player_number: numericId,
                name: displayName,
                avatar: firebaseUser.photoURL || "🏆",
                district: "觀塘區",
                score: 1000,
                streak: 0,
                wins: 0,
                losses: 0,
                ties: 0,
                email: firebaseUser.email
            };
            await setDoc(playerRef, newPlayer);
            return { id: firebaseUser.uid, ...newPlayer };
        }
    }

    async function loadRankings() {
        try {
            const q = query(collection(db, "players"), orderBy("score", "desc"), limit(200));
            const querySnapshot = await getDocs(q);
            allPlayers = [];
            querySnapshot.forEach(doc => {
                allPlayers.push({ id: doc.id, ...doc.data() });
            });
            filteredPlayers = [...allPlayers];
            renderRanking();
        } catch (err) {
            console.error("載入排行榜失敗", err);
            showToast("載入排行榜失敗，請檢查網路", true);
        }
    }

    async function updatePlayerProfile(avatar, district) {
        if (!currentUser) return;
        const playerRef = doc(db, "players", currentUser.id);
        await updateDoc(playerRef, { avatar, district });
        currentUser.avatar = avatar;
        currentUser.district = district;
        updateSidebarUI();
        loadRankings();
        showToast("檔案已更新");
    }

    async function logout() {
        if (confirm("確定要登出嗎？")) {
            await signOut(auth);
            showToast("已登出");
        }
    }

    async function doLogin() {
        const numericId = loginIdInput.value.trim();
        const password = loginPasswordInput.value;
        if (!numericId || !password) { showToast("請輸入數字ID和密碼", true); return; }
        const email = numericId + "@gyro.local";
        setButtonLoading(doLoginBtn, true);
        try {
            await signInWithEmailAndPassword(auth, email, password);
            closeAuthModal();
            showToast("登入成功");
        } catch (error) {
            let msg = "登入失敗";
            if (error.code === 'auth/user-not-found') msg = "找不到此玩家ID";
            else if (error.code === 'auth/wrong-password') msg = "密碼錯誤";
            else if (error.code === 'auth/invalid-email') msg = "ID格式錯誤";
            showToast(msg, true);
        } finally {
            setButtonLoading(doLoginBtn, false);
        }
    }

    async function googleLogin() {
        setButtonLoading(googleLoginBtn, true);
        try {
            const result = await signInWithPopup(auth, provider);
            closeAuthModal();
            showToast(`歡迎，${result.user.displayName || "玩家"}`);
        } catch (error) {
            let msg = "Google 登入失敗";
            if (error.code === 'auth/popup-closed-by-user') msg = "您關閉了彈窗，請重新嘗試";
            else if (error.code === 'auth/account-exists-with-different-credential') msg = "此電子郵件已使用其他方式註冊";
            showToast(msg, true);
        } finally {
            setButtonLoading(googleLoginBtn, false);
        }
    }

    async function doRegister() {
        const name = regNameInput.value.trim();
        const district = regDistrictSelect.value;
        const password = regPasswordInput.value;
        if (!name || !password) { showToast("請填寫名稱和密碼", true); return; }
        if (password.length < 6) { showToast("密碼至少 6 位", true); return; }
        const numericId = Math.floor(10000 + Math.random() * 90000);
        const email = numericId + "@gyro.local";
        setButtonLoading(doRegisterBtn, true);
        try {
            const userCred = await createUserWithEmailAndPassword(auth, email, password);
            const uid = userCred.user.uid;
            const newPlayer = {
                player_number: numericId,
                name: name,
                avatar: selectedRegAvatar,
                district: district,
                score: 1000,
                streak: 0,
                wins: 0,
                losses: 0,
                ties: 0,
                email: email
            };
            await setDoc(doc(db, "players", uid), newPlayer);
            showToast(`註冊成功！您的玩家ID是 ${numericId}，請用此ID登入`);
            switchAuthTab('login');
            regNameInput.value = "";
            regPasswordInput.value = "";
        } catch (error) {
            let msg = "註冊失敗";
            if (error.code === 'auth/email-already-in-use') msg = "此ID已被使用，請重新註冊";
            showToast(msg, true);
        } finally {
            setButtonLoading(doRegisterBtn, false);
        }
    }

    async function registerWithGoogle() {
        await googleLogin();
    }

    function updateSidebarUI() {
        if (currentUser) {
            const av = currentUser.avatar;
            if (av && (av.startsWith("http") || av.startsWith("data:image"))) {
                sideUserAvatar.innerHTML = `<img src="${av}" alt="avatar">`;
            } else {
                sideUserAvatar.innerHTML = av || "🏆";
            }
            sideUserName.innerText = currentUser.name;
            loginMenuItem.innerHTML = '<i class="fas fa-sign-out-alt"></i> 登出';
        } else {
            sideUserAvatar.innerHTML = "🏆";
            sideUserName.innerText = "訪客";
            loginMenuItem.innerHTML = '<i class="fas fa-sign-in-alt"></i> 登入 / 註冊';
        }
    }

    // 監聽 Auth 狀態
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = await getOrCreatePlayer(user);
            updateSidebarUI();
            if (allPlayers.length === 0) await loadRankings();
            else loadRankings();
            closeAuthModal();
            closeProfileModal();
        } else {
            currentUser = null;
            updateSidebarUI();
        }
    });

    // 排行榜渲染函數
    function renderRanking() {
        if (!rankTbody) return;
        const start = (currentPage - 1) * itemsPerPage;
        const pagePlayers = filteredPlayers.slice(start, start + itemsPerPage);
        if (pagePlayers.length === 0) { rankTbody.innerHTML = "<tr><td colspan='5'>暫無資料</td></tr>"; return; }
        let html = "";
        pagePlayers.forEach(p => {
            const rank = allPlayers.findIndex(p2 => p2.id === p.id) + 1;
            let avatarHtml = p.avatar;
            if (p.avatar && (p.avatar.startsWith("http") || p.avatar.startsWith("data:image"))) {
                avatarHtml = `<img src="${p.avatar}" style="width:100%; height:100%; object-fit:cover; border-radius:50%;">`;
            }
            html += `<tr data-id="${p.id}">
                <td class="rank-number">${rank}</td>
                <td class="player-name-cell"><span class="player-avatar">${avatarHtml}</span> ${p.name} <span class="player-id">(${p.player_number})</span></td>
                <td class="score-value">${p.score}</td>
                <td><span class="player-streak">${p.streak}連勝</span></td>
                <td class="win-loss">${p.wins}勝 ${p.losses}敗 ${p.ties}平</td>
            </tr>`;
        });
        rankTbody.innerHTML = html;
        document.querySelectorAll("#rankTbody tr").forEach(row => {
            row.addEventListener("click", () => {
                const pid = row.getAttribute("data-id");
                const player = allPlayers.find(p => p.id === pid);
                if (player) showPlayerPopup(player);
            });
        });
        paginationInfo.innerText = `${start+1}-${Math.min(start+itemsPerPage, filteredPlayers.length)} / ${filteredPlayers.length}`;
        totalPlayersSpan.innerText = allPlayers.length;
        const maxStreak = Math.max(...allPlayers.map(p => p.streak || 0), 0);
        highestStreakSpan.innerText = maxStreak;
        if (allPlayers.length) weeklyChampionSpan.innerText = allPlayers[0].name;
        renderPagination();
    }

    function renderPagination() {
        const totalPages = Math.ceil(filteredPlayers.length / itemsPerPage);
        if (totalPages <= 1) { paginationControls.innerHTML = ""; return; }
        let html = `<button class="page-btn" data-page="${currentPage-1}" ${currentPage===1 ? 'disabled' : ''}>〈 上一頁</button>`;
        for (let i = Math.max(1, currentPage-2); i <= Math.min(totalPages, currentPage+2); i++)
            html += `<button class="page-btn ${i===currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
        html += `<button class="page-btn" data-page="${currentPage+1}" ${currentPage===totalPages ? 'disabled' : ''}>下一頁 〉</button>`;
        paginationControls.innerHTML = html;
        document.querySelectorAll(".page-btn").forEach(btn => {
            if (!btn.disabled && btn.dataset.page)
                btn.addEventListener("click", () => { currentPage = parseInt(btn.dataset.page); renderRanking(); });
        });
    }

    function searchPlayers(term) {
        currentSearchTerm = term.trim().toLowerCase();
        if (!currentSearchTerm) filteredPlayers = [...allPlayers];
        else filteredPlayers = allPlayers.filter(p => p.name.toLowerCase().includes(currentSearchTerm) || p.player_number.toString().includes(currentSearchTerm));
        currentPage = 1;
        renderRanking();
        const infoDiv = document.getElementById("searchResultInfo");
        if (currentSearchTerm) infoDiv.innerHTML = `<i class="fas fa-search"></i> 搜尋 "${currentSearchTerm}" 共 ${filteredPlayers.length} 位`;
        else infoDiv.innerHTML = "";
    }

    function showPlayerPopup(player) {
        const rank = allPlayers.findIndex(p => p.id === player.id) + 1;
        const total = player.wins + player.losses + player.ties;
        const winRate = total ? Math.round(player.wins / total * 100) : 0;
        let avatarHtml = player.avatar;
        if (player.avatar && (player.avatar.startsWith("http") || player.avatar.startsWith("data:image"))) {
            avatarHtml = `<img src="${player.avatar}" style="width:100%; height:100%; object-fit:cover;">`;
        }
        popupName.innerText = player.name;
        popupBody.innerHTML = `
            <div class="popup-avatar"><div class="avatar-large">${avatarHtml}</div></div>
            <div class="info-row"><span>玩家ID</span><span>${player.player_number}</span></div>
            <div class="info-row"><span>活躍區域</span><span>${player.district || "未設定"}</span></div>
            <div class="info-row"><span>全港排名</span><span>第 ${rank}</span></div>
            <div class="info-row"><span>積分</span><span>${player.score}</span></div>
            <div class="info-row"><span>連勝</span><span>${player.streak}</span></div>
            <div class="stats-grid"><div class="stat-card">${player.wins}<br>勝</div><div class="stat-card">${player.losses}<br>敗</div><div class="stat-card">${player.ties}<br>平</div><div class="stat-card">${winRate}%<br>勝率</div></div>
        `;
        popupOverlay.classList.add("active");
    }

    function closePopup() { popupOverlay.classList.remove("active"); }

    // Modal 控制
    function openAuthModal() { authModal.classList.add("active"); }
    function closeAuthModal() { authModal.classList.remove("active"); }
    function switchAuthTab(tab) {
        if (tab === 'login') {
            loginForm.style.display = "block";
            registerForm.style.display = "none";
            document.getElementById("loginTabBtn").classList.add("active");
            document.getElementById("registerTabBtn").classList.remove("active");
        } else {
            loginForm.style.display = "none";
            registerForm.style.display = "block";
            document.getElementById("loginTabBtn").classList.remove("active");
            document.getElementById("registerTabBtn").classList.add("active");
        }
    }

    function openProfileModal() {
        if (!currentUser) { showToast("請先登入", true); return; }
        const av = currentUser.avatar;
        if (av && (av.startsWith("http") || av.startsWith("data:image"))) {
            profileAvatarPreview.innerHTML = `<img src="${av}" style="width:100%; height:100%; object-fit:cover;">`;
        } else {
            profileAvatarPreview.innerHTML = `<div style="font-size:2rem;">${av || "🏆"}</div>`;
        }
        profileDistrictSelect.value = currentUser.district || "觀塘區";
        profileModal.classList.add("active");
    }
    function closeProfileModal() { profileModal.classList.remove("active"); }
    async function saveProfile() {
        const newAvatar = selectedProfileAvatar || currentUser.avatar;
        const newDistrict = profileDistrictSelect.value;
        await updatePlayerProfile(newAvatar, newDistrict);
        closeProfileModal();
    }

    // 頭像選擇器
    function setupRegisterEmoji() {
        const emojis = ["🦅","🐉","🦁","🐺","🦄","🔥","🦈","⚔️","🛡️","🌟","🌊","⚡","❄️","🌙","🎯"];
        const grid = document.getElementById("regEmojiGrid");
        grid.innerHTML = emojis.map(e => `<div class="emoji-option" data-emoji="${e}">${e}</div>`).join("");
        document.querySelectorAll("#regEmojiGrid .emoji-option").forEach(el => {
            el.addEventListener("click", () => {
                selectedRegAvatar = el.getAttribute("data-emoji");
                document.getElementById("regAvatarPreview").innerHTML = `<div style="font-size:1.8rem;">${selectedRegAvatar}</div>`;
            });
        });
        const upload = document.getElementById("regAvatarUpload");
        upload.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    selectedRegAvatar = ev.target.result;
                    document.getElementById("regAvatarPreview").innerHTML = `<img src="${selectedRegAvatar}" style="width:100%; height:100%; object-fit:cover; border-radius:50%;">`;
                };
                reader.readAsDataURL(file);
            }
        };
    }

    function setupProfileEmoji() {
        const emojis = ["🦅","🐉","🦁","🐺","🦄","🔥","🦈","⚔️","🛡️","🌟","🌊","⚡","❄️","🌙","🎯"];
        const grid = document.getElementById("profileEmojiGrid");
        grid.innerHTML = emojis.map(e => `<div class="emoji-option" data-emoji="${e}">${e}</div>`).join("");
        document.querySelectorAll("#profileEmojiGrid .emoji-option").forEach(el => {
            el.addEventListener("click", () => {
                selectedProfileAvatar = el.getAttribute("data-emoji");
                profileAvatarPreview.innerHTML = `<div style="font-size:2rem;">${selectedProfileAvatar}</div>`;
            });
        });
        const upload = document.getElementById("profileAvatarUpload");
        upload.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    selectedProfileAvatar = ev.target.result;
                    profileAvatarPreview.innerHTML = `<img src="${selectedProfileAvatar}" style="width:100%; height:100%; object-fit:cover;">`;
                };
                reader.readAsDataURL(file);
            }
        };
    }

    function renderRooms() {
        const mockRooms = [
            { id:"rm1", host:"星穹天馬", location:"維園草地", time:"今晚 8:00", players:2, max:4 },
            { id:"rm2", host:"銀翼龍騎", location:"麥花臣球場", time:"明日 15:00", players:1, max:4 }
        ];
        if (!roomList) return;
        if (mockRooms.length === 0) { roomList.innerHTML = "<div style='text-align:center;padding:20px'>暫無約戰</div>"; return; }
        let html = "";
        mockRooms.forEach(r => {
            html += `<div class="room-card"><div class="room-title"><span><i class="fas fa-gamepad"></i> ${r.host} 的房間</span><button class="join-btn" data-id="${r.id}">加入</button></div>
            <div class="room-detail"><i class="fas fa-map-marker-alt"></i> ${r.location} &nbsp; <i class="far fa-clock"></i> ${r.time}</div>
            <div class="room-detail"><i class="fas fa-user-friends"></i> ${r.players}/${r.max} 人</div></div>`;
        });
        roomList.innerHTML = html;
        document.querySelectorAll(".join-btn").forEach(btn => {
            btn.addEventListener("click", (e) => { e.stopPropagation(); if (!currentUser) showToast("請先登入", true); else alert("預約功能開發中"); });
        });
    }

    function closeMenu() {
        const sideMenu = document.getElementById("sideMenu");
        const overlay = document.getElementById("overlay");
        if (sideMenu) sideMenu.classList.remove("open");
        if (overlay) overlay.classList.remove("active");
    }

    // DOMContentLoaded 綁定事件
    document.addEventListener('DOMContentLoaded', () => {
        rankTbody = document.getElementById("rankTbody");
        searchInput = document.getElementById("searchInput");
        searchBtn = document.getElementById("searchBtn");
        clearBtn = document.getElementById("clearSearchBtn");
        paginationControls = document.getElementById("paginationControls");
        paginationInfo = document.getElementById("paginationInfo");
        totalPlayersSpan = document.getElementById("totalPlayersCount");
        highestStreakSpan = document.getElementById("highestStreak");
        weeklyChampionSpan = document.getElementById("weeklyChampion");
        sideUserAvatar = document.getElementById("sideUserAvatar");
        sideUserName = document.getElementById("sideUserName");
        loginMenuItem = document.getElementById("loginMenuItem");
        authModal = document.getElementById("authModal");
        loginForm = document.getElementById("loginForm");
        registerForm = document.getElementById("registerForm");
        loginIdInput = document.getElementById("loginId");
        loginPasswordInput = document.getElementById("loginPassword");
        doLoginBtn = document.getElementById("doLoginBtn");
        googleLoginBtn = document.getElementById("googleLoginBtn");
        regNameInput = document.getElementById("regName");
        regDistrictSelect = document.getElementById("regDistrict");
        regPasswordInput = document.getElementById("regPassword");
        doRegisterBtn = document.getElementById("doRegisterBtn");
        regGoogleBtn = document.getElementById("regGoogleBtn");
        profileModal = document.getElementById("profileModal");
        profileAvatarPreview = document.getElementById("profileAvatarPreview");
        profileDistrictSelect = document.getElementById("profileDistrict");
        saveProfileBtn = document.getElementById("saveProfileBtn");
        popupOverlay = document.getElementById("popupOverlay");
        popupName = document.getElementById("popupName");
        popupBody = document.getElementById("popupBody");
        popupCloseBtn = document.getElementById("popupCloseBtn");
        createRoomBtn = document.getElementById("createRoomBtn");
        roomList = document.getElementById("roomList");

        searchBtn.addEventListener("click", () => searchPlayers(searchInput.value));
        clearBtn.addEventListener("click", () => { searchInput.value = ""; searchPlayers(""); });
        searchInput.addEventListener("keypress", (e) => { if (e.key === "Enter") searchPlayers(searchInput.value); });
        loginMenuItem.addEventListener("click", (e) => { e.preventDefault(); if (currentUser) logout(); else openAuthModal(); closeMenu(); });
        document.getElementById("myProfileMenuItem")?.addEventListener("click", (e) => { e.preventDefault(); openProfileModal(); closeMenu(); });
        document.getElementById("battleHistoryMenuItem")?.addEventListener("click", () => { alert("對戰紀錄開發中"); closeMenu(); });
        document.getElementById("scanBattleMenuItem")?.addEventListener("click", () => { if (!currentUser) showToast("請先登入", true); else alert("掃碼對戰開發中"); closeMenu(); });
        document.getElementById("rulesMenuItem")?.addEventListener("click", () => { alert("排行榜說明：\n- 初始1000分\n- 勝者奪敗者10%積分..."); closeMenu(); });
        createRoomBtn.addEventListener("click", () => { if (!currentUser) showToast("請先登入", true); else alert("開設房間功能開發中"); });
        renderRooms();

        document.getElementById("closeAuthBtn").addEventListener("click", closeAuthModal);
        authModal.addEventListener("click", (e) => { if (e.target === authModal) closeAuthModal(); });
        document.getElementById("loginTabBtn").addEventListener("click", () => switchAuthTab('login'));
        document.getElementById("registerTabBtn").addEventListener("click", () => switchAuthTab('register'));
        doLoginBtn.addEventListener("click", doLogin);
        googleLoginBtn.addEventListener("click", googleLogin);
        doRegisterBtn.addEventListener("click", doRegister);
        if (regGoogleBtn) regGoogleBtn.addEventListener("click", registerWithGoogle);

        document.getElementById("closeProfileBtn").addEventListener("click", closeProfileModal);
        profileModal.addEventListener("click", (e) => { if (e.target === profileModal) closeProfileModal(); });
        saveProfileBtn.addEventListener("click", saveProfile);
        popupCloseBtn.addEventListener("click", closePopup);
        popupOverlay.addEventListener("click", (e) => { if (e.target === popupOverlay) closePopup(); });

        const menuBtn = document.getElementById("menuToggleBtn");
        const sideMenu = document.getElementById("sideMenu");
        const overlay = document.getElementById("overlay");
        menuBtn.addEventListener("click", () => { sideMenu.classList.add("open"); overlay.classList.add("active"); });
        overlay.addEventListener("click", () => { sideMenu.classList.remove("open"); overlay.classList.remove("active"); });

        setupRegisterEmoji();
        setupProfileEmoji();
    });

    // 初次載入排行榜 (若未登入也會顯示)
    loadRankings();
</script>
</body>
</html>
