<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>爆旋陀螺 · 天馬戰榜 | 自訂頭像</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f0f4fc 0%, #e6edf6 100%);
            font-family: system-ui, 'Segoe UI', 'Roboto', -apple-system, sans-serif;
            line-height: 1.4;
            color: #1a2c3e;
            padding: 0;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" opacity="0.06"><path fill="none" stroke="%232c6e9e" stroke-width="1.5" d="M100 20 L120 40 L100 60 L80 40 Z M100 80 L130 110 L100 140 L70 110 Z M100 150 L115 170 L100 190 L85 170 Z" /><circle cx="100" cy="100" r="18" stroke="%232c6e9e" fill="none" stroke-width="1"/></svg>');
            background-repeat: repeat;
            background-size: 48px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px 12px;
            position: relative;
            z-index: 2;
        }

        /* 頂欄 */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            padding-bottom: 12px;
            border-bottom: 2px solid rgba(44, 110, 158, 0.3);
            margin-bottom: 20px;
        }

        .logo-area h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1e4a76, #2c7ab8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-area h1 i {
            color: #2c6e9e;
            font-size: 1.4rem;
        }

        .logo-area p {
            font-size: 0.7rem;
            color: #4a6f8f;
            margin-top: 2px;
        }

        .menu-btn {
            background: rgba(255,255,255,0.8);
            border: 1px solid #c0d4e8;
            padding: 8px 12px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            cursor: pointer;
        }
        .menu-btn span {
            width: 22px;
            height: 2px;
            background: #2c6280;
            display: block;
        }

        /* 側邊選單 */
        .side-menu {
            position: fixed;
            top: 0;
            right: -280px;
            width: 280px;
            height: 100%;
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(10px);
            box-shadow: -4px 0 20px rgba(0,0,0,0.1);
            transition: right 0.25s ease;
            z-index: 1000;
            border-left: 1px solid #cde3f5;
        }
        .side-menu.open { right: 0; }
        .menu-header {
            padding: 20px 16px;
            border-bottom: 1px solid #e0ecf8;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-icon-large {
            width: 48px;
            height: 48px;
            background: #e0edfc;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            overflow: hidden;
        }
        .user-icon-large img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .menu-items { list-style: none; padding: 12px 0; }
        .menu-items li {
            padding: 12px 20px;
            border-bottom: 1px solid #ecf3fa;
        }
        .menu-items li a {
            text-decoration: none;
            color: #2c5a7a;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(2px);
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
            z-index: 999;
        }
        .overlay.active { opacity: 1; visibility: visible; }

        /* 搜尋列 */
        .search-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-input {
            flex: 1;
            min-width: 0;
            padding: 12px 16px;
            border: 1px solid #cbdde9;
            border-radius: 44px;
            font-size: 0.9rem;
            background: white;
        }
        .search-btn, .clear-btn {
            padding: 12px 20px;
            border-radius: 44px;
            font-weight: 600;
            font-size: 0.85rem;
            border: none;
            cursor: pointer;
            white-space: nowrap;
        }
        .search-btn { background: #2c6e9e; color: white; }
        .clear-btn { background: #eef2f8; color: #2c5a7a; border: 1px solid #cbdde9; }
        .search-result-info {
            font-size: 0.7rem;
            color: #5a7e9c;
            margin: -8px 0 12px 8px;
        }

        /* 主內容直排 */
        .dashboard { display: flex; flex-direction: column; gap: 20px; }

        /* 排名榜 */
        .rank-panel {
            background: #ffffffdd;
            backdrop-filter: blur(4px);
            border-radius: 24px;
            border: 1px solid rgba(44,110,158,0.2);
            overflow: hidden;
        }
        .panel-header {
            padding: 14px 16px;
            background: linear-gradient(90deg, #fafdff, #f0f6fe);
            border-bottom: 2px solid #2c6e9e;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 8px;
        }
        .panel-header h2 { font-size: 1.2rem; display: flex; align-items: center; gap: 6px; }
        .pagination-info { font-size: 0.7rem; color: #5a7a9a; }

        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .rank-table {
            min-width: 580px;
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        .rank-table th {
            text-align: left;
            padding: 12px 12px;
            background: #f8fafd;
            font-weight: 600;
            color: #2c5a7a;
            border-bottom: 1px solid #e2edf6;
        }
        .rank-table td {
            padding: 12px 12px;
            border-bottom: 1px solid #ecf3fa;
            cursor: pointer;
            vertical-align: middle;
        }
        .rank-number { font-weight: 700; color: #3a6b92; width: 55px; }
        .player-name-cell {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: nowrap;
            white-space: nowrap;
        }
        .player-avatar {
            width: 36px;
            height: 36px;
            background: #eaf3fc;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
            overflow: hidden;
        }
        .player-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .player-id {
            font-size: 0.65rem;
            color: #8aa9c2;
            margin-left: 4px;
            font-weight: normal;
            white-space: nowrap;
        }
        .player-streak {
            background: #e9f0f7;
            padding: 3px 8px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #2c6e9e;
            white-space: nowrap;
        }
        .score-value { font-weight: 800; font-size: 1rem; color: #1e5a88; }
        .win-loss { font-size: 0.7rem; color: #6f8daa; white-space: nowrap; }

        /* 約戰大廳 & 資訊 */
        .battle-lobby, .info-panel {
            background: #ffffffdd;
            backdrop-filter: blur(4px);
            border-radius: 24px;
            border: 1px solid rgba(44,110,158,0.2);
            overflow: hidden;
        }
        .lobby-header, .info-block h3 {
            padding: 14px 16px;
            background: linear-gradient(90deg, #fafdff, #f0f6fe);
            border-bottom: 2px solid #2c6e9e;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .create-room-btn {
            background: #2c6e9e;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            margin: 16px;
            width: calc(100% - 32px);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .room-list { padding: 0 12px 20px; max-height: 340px; overflow-y: auto; }
        .room-card {
            background: #f8fbfe;
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #e2edf6;
        }
        .room-title { font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
        .room-detail { font-size: 0.7rem; color: #5a7e9c; margin: 8px 0; display: flex; gap: 12px; flex-wrap: wrap; }
        .join-btn {
            background: transparent;
            border: 1px solid #2c6e9e;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
        }
        .info-block { padding: 0 0 16px 0; }
        .rule-list { list-style: none; padding: 0 16px; }
        .rule-list li {
            font-size: 0.75rem;
            padding: 8px 0;
            border-bottom: 1px solid #e9f0f7;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .stat-badge {
            background: #eef3fc;
            border-radius: 20px;
            padding: 12px;
            margin: 12px 16px;
            text-align: center;
        }
        .stat-number { font-size: 1.4rem; font-weight: 800; }
        .double-stats { display: flex; gap: 12px; margin-top: 8px; }
        .stat-item { flex: 1; background: white; border-radius: 16px; padding: 6px; }
        footer {
            margin-top: 28px;
            text-align: center;
            font-size: 0.65rem;
            padding: 16px 0 8px;
            color: #6c8eaa;
            border-top: 1px solid #d4e2f0;
        }

        /* Popup 彈窗 */
        .popup-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
        }
        .popup-overlay.active { opacity: 1; visibility: visible; }
        .popup-container {
            background: white;
            width: 88%;
            max-width: 380px;
            border-radius: 32px;
            overflow: hidden;
        }
        .popup-header {
            padding: 16px 20px;
            background: #fafdff;
            border-bottom: 2px solid #2c6e9e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .popup-close { font-size: 1.6rem; background: none; border: none; cursor: pointer; }
        .popup-body { padding: 20px; }
        .popup-avatar {
            display: flex;
            justify-content: center;
            margin-bottom: 16px;
        }
        .popup-avatar .avatar-large {
            width: 80px;
            height: 80px;
            background: #eaf3fc;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            overflow: hidden;
        }
        .popup-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #ecf3fa;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 12px;
        }
        .stat-card {
            background: #f0f6fc;
            padding: 8px;
            text-align: center;
            border-radius: 16px;
            font-size: 0.8rem;
        }

        /* 頭像選擇器 Modal */
        .avatar-modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2100;
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
        }
        .avatar-modal.active { opacity: 1; visibility: visible; }
        .avatar-modal-content {
            background: white;
            width: 90%;
            max-width: 360px;
            border-radius: 32px;
            padding: 20px;
        }
        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            margin: 16px 0;
            max-height: 200px;
            overflow-y: auto;
        }
        .emoji-option {
            font-size: 2rem;
            text-align: center;
            cursor: pointer;
            padding: 8px;
            border-radius: 12px;
            background: #f0f6fc;
        }
        .upload-area {
            margin-top: 16px;
            text-align: center;
        }
        .avatar-preview {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #eef2f8;
            margin: 10px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 6px;
            padding: 12px;
            flex-wrap: wrap;
        }
        .page-btn {
            background: transparent;
            border: 1px solid #c0d4e8;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .page-btn.active {
            background: #2c6e9e;
            color: white;
        }
        button, .join-btn, .page-btn { touch-action: manipulation; }
    </style>
</head>
<body>
<div class="container">
    <div class="navbar">
        <div class="logo-area">
            <h1><i class="fas fa-bezier-curve"></i> 天馬陀螺戰榜</h1>
            <p>香港街頭對戰 · 自訂頭像</p>
        </div>
        <button class="menu-btn" id="menuToggleBtn"><span></span><span></span><span></span></button>
    </div>

    <!-- 側選單 -->
    <div class="side-menu" id="sideMenu">
        <div class="menu-header">
            <div class="user-icon-large" id="sideUserAvatar">🏆</div>
            <div id="sideUserName">訪客</div>
        </div>
        <ul class="menu-items">
            <li><a id="loginMenuItem"><i class="fas fa-sign-in-alt"></i> 登入 / 註冊</a></li>
            <li><a id="myProfileMenuItem"><i class="fas fa-id-card"></i> 我的檔案</a></li>
            <li><a><i class="fas fa-history"></i> 對戰紀錄</a></li>
            <li><a><i class="fas fa-qrcode"></i> 掃碼對戰</a></li>
            <li><a><i class="fas fa-info-circle"></i> 排行榜說明</a></li>
        </ul>
    </div>
    <div class="overlay" id="overlay"></div>

    <!-- 搜尋列 -->
    <div class="search-bar">
        <input type="text" class="search-input" id="searchInput" placeholder="玩家名稱 或 ID">
        <button class="search-btn" id="searchBtn"><i class="fas fa-search"></i> 搜尋</button>
        <button class="clear-btn" id="clearSearchBtn"><i class="fas fa-times"></i> 清除</button>
    </div>
    <div id="searchResultInfo" class="search-result-info"></div>

    <div class="dashboard">
        <!-- 排名榜 -->
        <div class="rank-panel">
            <div class="panel-header">
                <h2><i class="fas fa-trophy"></i> 戰士排行</h2>
                <div class="pagination-info" id="paginationInfo">-</div>
            </div>
            <div class="table-wrapper">
                <table class="rank-table" id="rankTable">
                    <thead><tr><th>排名</th><th>戰士</th><th>積分</th><th>連勝</th><th>戰績</th></tr></thead>
                    <tbody id="rankTbody"><tr><td colspan="5">載入中...</td></tr></tbody>
                </table>
            </div>
            <div class="pagination" id="paginationControls"></div>
        </div>

        <!-- 約戰大廳 -->
        <div class="battle-lobby">
            <div class="lobby-header"><i class="fas fa-users"></i> 約戰大廳</div>
            <button class="create-room-btn" id="createRoomBtn"><i class="fas fa-plus-circle"></i> 開設陀螺房間</button>
            <div class="room-list" id="roomList">載入中...</div>
        </div>

        <!-- 規則資訊 -->
        <div class="info-panel">
            <div class="info-block">
                <h3><i class="fas fa-dice-d6"></i> 積分規則</h3>
                <ul class="rule-list">
                    <li><i class="fas fa-star"></i> 初始1000分</li>
                    <li><i class="fas fa-bolt"></i> 勝者奪敗者10% (上限150)</li>
                    <li><i class="fas fa-shield-alt"></i> 新手保護 ≤500分扣5%</li>
                    <li><i class="fas fa-clock"></i> 同一對手24hr一次</li>
                    <li><i class="fas fa-fire"></i> 連勝加成: 3連勝+2%</li>
                </ul>
                <div class="stat-badge">
                    <div class="stat-number" id="totalPlayersCount">0</div>
                    <div>活躍鬥士</div>
                    <div class="double-stats">
                        <div class="stat-item"><div class="stat-number" id="highestStreak">0</div><div>最高連勝</div></div>
                        <div class="stat-item"><div class="stat-number" id="weeklyChampion">-</div><div>陀螺王</div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer><i class="fas fa-bezier-curve"></i> 香港爆旋陀螺協會 · 公平競技</footer>
</div>

<!-- 玩家詳細 Popup -->
<div class="popup-overlay" id="popupOverlay">
    <div class="popup-container">
        <div class="popup-header"><h3 id="popupName">玩家</h3><button class="popup-close" id="popupCloseBtn">&times;</button></div>
        <div class="popup-body" id="popupBody"></div>
    </div>
</div>

<!-- 頭像選擇器 Modal -->
<div class="avatar-modal" id="avatarModal">
    <div class="avatar-modal-content">
        <h3 style="margin-bottom: 12px;">選擇頭像</h3>
        <div class="emoji-grid" id="emojiGrid"></div>
        <div class="upload-area">
            <label for="avatarUpload" style="display: inline-block; background: #2c6e9e; color: white; padding: 8px 16px; border-radius: 40px; cursor: pointer;">上傳圖片</label>
            <input type="file" id="avatarUpload" accept="image/*" style="display: none;">
            <div class="avatar-preview" id="avatarPreview"></div>
        </div>
        <button id="saveAvatarBtn" style="width:100%; margin-top: 16px; padding: 10px; background: #1e5a88; color: white; border: none; border-radius: 40px;">儲存頭像</button>
    </div>
</div>

<script>
    // ---------- 玩家數據 (支援頭像 avatar: 可為 emoji 或 base64) ----------
    const STORAGE_PLAYERS = "gyro_rank_avatar_v1";
    const DEFAULT_EMOJIS = ["🦅","🐉","🦁","🐺","🦄","🔥","🦈","⚔️","🛡️","🌟","🌊","⚡","❄️","🌙","🎯"];
    
    function generateMockPlayers(count) {
        const prefixes = ["星穹","銀翼","雷光","霜羽","烈風","冰晶","炎羽","蒼海","破曉","暗影"];
        const suffixes = ["天馬","龍騎","飛獅","白狼","鷹眼","獨角","鳳凰","戰鯊","騎士","武士"];
        let players = [];
        for (let i=1;i<=count;i++) {
            let name = prefixes[i%prefixes.length]+"·"+suffixes[i%suffixes.length];
            let avatar = DEFAULT_EMOJIS[i % DEFAULT_EMOJIS.length];
            let score = 800 + Math.floor(Math.random()*1000);
            let streak = Math.floor(Math.random()*8);
            let wins = Math.floor(Math.random()*30);
            let losses = Math.floor(Math.random()*25);
            let ties = Math.floor(Math.random()*5);
            players.push({ id:`GY${String(i).padStart(4,'0')}`, name, avatar, score, streak, wins, losses, ties });
        }
        if(players[0]) players[0].score=1850; if(players[1]) players[1].score=1720;
        players.sort((a,b)=>b.score-a.score);
        return players;
    }
    
    let allPlayers=[], filteredPlayers=[], currentPage=1, itemsPerPage=15, currentSearchTerm="";
    // 模擬當前登入用戶 (可修改頭像)
    let currentUserId = "GY0001";  // 預設一個示範用戶
    let currentUserObj = null;
    
    function loadData() {
        let stored = localStorage.getItem(STORAGE_PLAYERS);
        if(stored) {
            allPlayers = JSON.parse(stored);
        } else {
            allPlayers = generateMockPlayers(1250);
            saveData();
        }
        allPlayers.sort((a,b)=>b.score-a.score);
        filteredPlayers = [...allPlayers];
        // 確保當前用戶存在，若無則建立一個
        if(!allPlayers.find(p=>p.id===currentUserId)) {
            let newUser = { id: currentUserId, name: "天馬戰士", avatar: "🏆", score: 1000, streak: 0, wins:0, losses:0, ties:0 };
            allPlayers.unshift(newUser);
            saveData();
        }
        currentUserObj = allPlayers.find(p=>p.id===currentUserId);
        updateSidebarAvatar();
    }
    
    function saveData() { localStorage.setItem(STORAGE_PLAYERS, JSON.stringify(allPlayers)); }
    
    function updateSidebarAvatar() {
        let avatarDiv = document.getElementById("sideUserAvatar");
        if(currentUserObj) {
            if(currentUserObj.avatar.startsWith("data:image")) {
                avatarDiv.innerHTML = `<img src="${currentUserObj.avatar}" alt="avatar">`;
            } else {
                avatarDiv.innerHTML = currentUserObj.avatar;
            }
            document.getElementById("sideUserName").innerHTML = currentUserObj.name;
        }
    }
    
    function searchPlayers(term) {
        currentSearchTerm = term.trim().toLowerCase();
        if(!currentSearchTerm) filteredPlayers = [...allPlayers];
        else filteredPlayers = allPlayers.filter(p=>p.name.toLowerCase().includes(currentSearchTerm) || p.id.toLowerCase().includes(currentSearchTerm));
        currentPage=1; renderRanking(); updateSearchInfo();
    }
    function updateSearchInfo() {
        let div=document.getElementById("searchResultInfo");
        if(currentSearchTerm) div.innerHTML=`<i class="fas fa-search"></i> 搜尋 "${currentSearchTerm}" 共 ${filteredPlayers.length} 位`;
        else div.innerHTML="";
    }
    function clearSearch() { document.getElementById("searchInput").value=""; searchPlayers(""); }
    function getGlobalHighestStreak() { return Math.max(...allPlayers.map(p=>p.streak||0),0); }
    
    // 顯示玩家彈窗 (含大頭像)
    function showPlayerPopup(p) {
        let rank = allPlayers.findIndex(p2=>p2.id===p.id)+1;
        let total=p.wins+p.losses+p.ties;
        let winRate=total?Math.round(p.wins/total*100):0;
        let avatarHtml = "";
        if(p.avatar && p.avatar.startsWith("data:image")) {
            avatarHtml = `<img src="${p.avatar}" alt="avatar">`;
        } else {
            avatarHtml = p.avatar || "🏆";
        }
        document.getElementById("popupName").innerHTML = `${p.name}`;
        document.getElementById("popupBody").innerHTML = `
            <div class="popup-avatar"><div class="avatar-large">${avatarHtml}</div></div>
            <div class="info-row"><span>ID</span><span>${p.id}</span></div>
            <div class="info-row"><span>全港排名</span><span>第 ${rank}</span></div>
            <div class="info-row"><span>積分</span><span>${p.score}</span></div>
            <div class="info-row"><span>連勝</span><span>${p.streak}</span></div>
            <div class="stats-grid"><div class="stat-card">${p.wins}<br>勝</div><div class="stat-card">${p.losses}<br>敗</div><div class="stat-card">${p.ties}<br>平</div><div class="stat-card">${winRate}%<br>勝率</div></div>
        `;
        document.getElementById("popupOverlay").classList.add("active");
    }
    function closePopup() { document.getElementById("popupOverlay").classList.remove("active"); }
    
    // 渲染排名表格 (顯示頭像)
    function renderRanking() {
        let tbody=document.getElementById("rankTbody");
        let start=(currentPage-1)*itemsPerPage, end=start+itemsPerPage;
        let pagePlayers=filteredPlayers.slice(start,end);
        if(!pagePlayers.length){ tbody.innerHTML="<tr><td colspan='5'>暫無資料</td></tr>"; return; }
        let html="";
        pagePlayers.forEach(p=>{
            let rank=allPlayers.findIndex(p2=>p2.id===p.id)+1;
            let avatarHtml = "";
            if(p.avatar && p.avatar.startsWith("data:image")) {
                avatarHtml = `<img src="${p.avatar}" style="width:100%; height:100%; object-fit:cover; border-radius:50%;">`;
            } else {
                avatarHtml = p.avatar || "🏆";
            }
            html+=`<tr data-id="${p.id}">
                <td class="rank-number">${rank}</td>
                <td class="player-name-cell"><span class="player-avatar">${avatarHtml}</span> ${p.name} <span class="player-id">(${p.id})</span></td>
                <td class="score-value">${p.score}</td>
                <td><span class="player-streak">${p.streak}連勝</span></td>
                <td class="win-loss">${p.wins}勝 ${p.losses}敗 ${p.ties}平</td>
            </tr>`;
        });
        tbody.innerHTML=html;
        document.querySelectorAll("#rankTbody tr").forEach(row=>{
            row.addEventListener("click",()=>{
                let pid=row.getAttribute("data-id");
                let pl=allPlayers.find(p=>p.id===pid);
                if(pl) showPlayerPopup(pl);
            });
        });
        document.getElementById("paginationInfo").innerHTML=`${start+1}-${Math.min(end,filteredPlayers.length)} / ${filteredPlayers.length}`;
        document.getElementById("totalPlayersCount").innerText=allPlayers.length;
        document.getElementById("highestStreak").innerText=getGlobalHighestStreak();
        let top=[...allPlayers].sort((a,b)=>b.score-a.score)[0];
        if(top) document.getElementById("weeklyChampion").innerText=top.name;
        renderPagination();
    }
    
    function renderPagination() {
        let totalPages=Math.ceil(filteredPlayers.length/itemsPerPage);
        let div=document.getElementById("paginationControls");
        if(totalPages<=1){ div.innerHTML=""; return; }
        let html=``;
        html+=`<button class="page-btn" data-page="${currentPage-1}" ${currentPage===1?'disabled':''}>〈 上一頁</button>`;
        for(let i=Math.max(1,currentPage-2);i<=Math.min(totalPages,currentPage+2);i++)
            html+=`<button class="page-btn ${i===currentPage?'active':''}" data-page="${i}">${i}</button>`;
        html+=`<button class="page-btn" data-page="${currentPage+1}" ${currentPage===totalPages?'disabled':''}>下一頁 〉</button>`;
        div.innerHTML=html;
        document.querySelectorAll(".page-btn").forEach(btn=>{
            if(!btn.disabled && btn.dataset.page)
                btn.addEventListener("click",()=>{ currentPage=parseInt(btn.dataset.page); renderRanking(); });
        });
    }
    
    // 頭像選擇器邏輯
    let selectedAvatar = null;
    function openAvatarModal() {
        const modal = document.getElementById("avatarModal");
        // 生成 emoji 選項
        const emojiGrid = document.getElementById("emojiGrid");
        emojiGrid.innerHTML = DEFAULT_EMOJIS.map(emoji => `<div class="emoji-option" data-emoji="${emoji}">${emoji}</div>`).join("");
        document.querySelectorAll(".emoji-option").forEach(el => {
            el.addEventListener("click", () => {
                selectedAvatar = el.getAttribute("data-emoji");
                document.getElementById("avatarPreview").innerHTML = `<div style="font-size:2rem;">${selectedAvatar}</div>`;
            });
        });
        // 上傳圖片
        const uploadInput = document.getElementById("avatarUpload");
        uploadInput.onchange = (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    selectedAvatar = ev.target.result;
                    document.getElementById("avatarPreview").innerHTML = `<img src="${selectedAvatar}" style="width:100%; height:100%; object-fit:cover; border-radius:50%;">`;
                };
                reader.readAsDataURL(file);
            }
        };
        modal.classList.add("active");
    }
    function closeAvatarModal() { document.getElementById("avatarModal").classList.remove("active"); }
    function saveAvatar() {
        if(selectedAvatar && currentUserObj) {
            currentUserObj.avatar = selectedAvatar;
            // 更新 allPlayers 中的對應用戶
            const idx = allPlayers.findIndex(p=>p.id===currentUserId);
            if(idx !== -1) allPlayers[idx].avatar = selectedAvatar;
            saveData();
            updateSidebarAvatar();
            renderRanking();  // 刷新排名榜顯示
            closeAvatarModal();
            alert("頭像已更新！");
        } else {
            alert("請先選擇頭像");
        }
    }
    
    // 約戰大廳模擬
    let mockRooms = [
        { id:"rm1", host:"星穹天馬", location:"維園草地", time:"今晚 8:00", players:2, max:4 },
        { id:"rm2", host:"銀翼龍騎", location:"麥花臣球場", time:"4月20日 15:00", players:1, max:4 },
        { id:"rm3", host:"雷光飛獅", location:"荔枝角公園", time:"週六 14:30", players:3, max:4 }
    ];
    function renderRooms() {
        let container=document.getElementById("roomList");
        if(mockRooms.length===0){ container.innerHTML="<div style='text-align:center;padding:20px'>暫無約戰，快開設房間！</div>"; return; }
        let html="";
        mockRooms.forEach(r=>{
            html+=`<div class="room-card"><div class="room-title"><span><i class="fas fa-gamepad"></i> ${r.host} 的房間</span><button class="join-btn" data-id="${r.id}">加入</button></div>
            <div class="room-detail"><i class="fas fa-map-marker-alt"></i> ${r.location} &nbsp; <i class="far fa-clock"></i> ${r.time}</div>
            <div class="room-detail"><i class="fas fa-user-friends"></i> ${r.players}/${r.max} 人</div></div>`;
        });
        container.innerHTML=html;
        document.querySelectorAll(".join-btn").forEach(btn=>{
            btn.addEventListener("click",(e)=>{ e.stopPropagation(); alert("預約戰鬥功能開發中，將結合掃碼對戰。"); });
        });
    }
    
    // UI 事件
    document.getElementById("createRoomBtn")?.addEventListener("click",()=>{ alert("開設房間：可設定時間、地點、人數 (敬請期待)"); });
    const menuBtn=document.getElementById("menuToggleBtn"), sideMenu=document.getElementById("sideMenu"), overlay=document.getElementById("overlay");
    function openMenu(){ sideMenu.classList.add("open"); overlay.classList.add("active"); }
    function closeMenu(){ sideMenu.classList.remove("open"); overlay.classList.remove("active"); }
    menuBtn.addEventListener("click",openMenu);
    overlay.addEventListener("click",closeMenu);
    let isLogged=false;
    document.getElementById("loginMenuItem")?.addEventListener("click",(e)=>{ e.preventDefault(); isLogged=!isLogged; if(isLogged) { /* 模擬登入成功 */ alert("登入功能預留，將綁定玩家ID"); } else { alert("已登出"); } closeMenu(); });
    document.getElementById("myProfileMenuItem")?.addEventListener("click",(e)=>{ e.preventDefault(); openAvatarModal(); closeMenu(); });
    document.querySelectorAll(".menu-items li a").forEach(link=>{ if(link.id!=="loginMenuItem" && link.id!=="myProfileMenuItem") link.addEventListener("click",()=>{ alert("此功能開發中"); closeMenu(); }); });
    document.getElementById("searchBtn")?.addEventListener("click",()=>searchPlayers(document.getElementById("searchInput").value));
    document.getElementById("clearSearchBtn")?.addEventListener("click",clearSearch);
    document.getElementById("popupCloseBtn")?.addEventListener("click",closePopup);
    document.getElementById("popupOverlay")?.addEventListener("click",(e)=>{ if(e.target===document.getElementById("popupOverlay")) closePopup(); });
    document.getElementById("searchInput")?.addEventListener("keypress",(e)=>{ if(e.key==="Enter") searchPlayers(e.target.value); });
    document.getElementById("saveAvatarBtn")?.addEventListener("click",saveAvatar);
    document.getElementById("avatarModal")?.addEventListener("click",(e)=>{ if(e.target===document.getElementById("avatarModal")) closeAvatarModal(); });
    
    loadData(); renderRanking(); renderRooms();
</script>
</body>
</html>
