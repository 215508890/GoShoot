<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>爆旋陀螺 · 天馬戰榜 | 香港排名</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #f0f4fc 0%, #e6edf6 100%);
            font-family: system-ui, 'Segoe UI', 'Roboto', -apple-system, sans-serif;
            line-height: 1.4;
            color: #1a2c3e;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" opacity="0.06"><path fill="none" stroke="%232c6e9e" stroke-width="1.5" d="M100 20 L120 40 L100 60 L80 40 Z M100 80 L130 110 L100 140 L70 110 Z M100 150 L115 170 L100 190 L85 170 Z" /><circle cx="100" cy="100" r="18" stroke="%232c6e9e" fill="none" stroke-width="1"/></svg>');
            background-repeat: repeat;
            background-size: 48px;
            pointer-events: none;
            z-index: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px 12px;
            position: relative;
            z-index: 2;
        }
        /* 頂欄 */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            padding-bottom: 12px;
            border-bottom: 2px solid rgba(44, 110, 158, 0.3);
            margin-bottom: 20px;
        }
        .logo-area h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1e4a76, #2c7ab8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo-area p {
            font-size: 0.7rem;
            color: #4a6f8f;
            margin-top: 2px;
        }
        .menu-btn {
            background: rgba(255,255,255,0.8);
            border: 1px solid #c0d4e8;
            padding: 8px 12px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            cursor: pointer;
        }
        .menu-btn span {
            width: 22px;
            height: 2px;
            background: #2c6280;
            display: block;
        }
        /* 側邊選單 */
        .side-menu {
            position: fixed;
            top: 0;
            right: -280px;
            width: 280px;
            height: 100%;
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(10px);
            box-shadow: -4px 0 20px rgba(0,0,0,0.1);
            transition: right 0.25s ease;
            z-index: 1000;
            border-left: 1px solid #cde3f5;
        }
        .side-menu.open { right: 0; }
        .menu-header {
            padding: 20px 16px;
            border-bottom: 1px solid #e0ecf8;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-icon-large {
            width: 48px;
            height: 48px;
            background: #e0edfc;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            overflow: hidden;
        }
        .user-icon-large img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .menu-items {
            list-style: none;
            padding: 12px 0;
        }
        .menu-items li {
            padding: 12px 20px;
            border-bottom: 1px solid #ecf3fa;
        }
        .menu-items li a {
            text-decoration: none;
            color: #2c5a7a;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(2px);
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
            z-index: 999;
        }
        .overlay.active {
            opacity: 1;
            visibility: visible;
        }
        /* 搜尋列 */
        .search-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-input {
            flex: 1;
            min-width: 0;
            padding: 12px 16px;
            border: 1px solid #cbdde9;
            border-radius: 44px;
            font-size: 0.9rem;
            background: white;
        }
        .search-btn, .clear-btn {
            padding: 12px 20px;
            border-radius: 44px;
            font-weight: 600;
            font-size: 0.85rem;
            border: none;
            cursor: pointer;
            white-space: nowrap;
        }
        .search-btn {
            background: #2c6e9e;
            color: white;
        }
        .clear-btn {
            background: #eef2f8;
            color: #2c5a7a;
            border: 1px solid #cbdde9;
        }
        .search-result-info {
            font-size: 0.7rem;
            color: #5a7e9c;
            margin: -8px 0 12px 8px;
        }
        /* 主內容直排 */
        .dashboard {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        /* 排名榜 */
        .rank-panel {
            background: #ffffffdd;
            backdrop-filter: blur(4px);
            border-radius: 24px;
            border: 1px solid rgba(44,110,158,0.2);
            overflow: hidden;
        }
        .panel-header {
            padding: 14px 16px;
            background: linear-gradient(90deg, #fafdff, #f0f6fe);
            border-bottom: 2px solid #2c6e9e;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 8px;
        }
        .panel-header h2 {
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .pagination-info {
            font-size: 0.7rem;
            color: #5a7a9a;
        }
        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .rank-table {
            min-width: 580px;
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        .rank-table th {
            text-align: left;
            padding: 12px 12px;
            background: #f8fafd;
            font-weight: 600;
            color: #2c5a7a;
            border-bottom: 1px solid #e2edf6;
        }
        .rank-table td {
            padding: 12px 12px;
            border-bottom: 1px solid #ecf3fa;
            cursor: pointer;
            vertical-align: middle;
        }
        .rank-number {
            font-weight: 700;
            color: #3a6b92;
            width: 55px;
        }
        .player-name-cell {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: nowrap;
            white-space: nowrap;
        }
        .player-avatar {
            width: 36px;
            height: 36px;
            background: #eaf3fc;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
            overflow: hidden;
        }
        .player-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .player-id {
            font-size: 0.65rem;
            color: #8aa9c2;
            margin-left: 4px;
            font-weight: normal;
            white-space: nowrap;
        }
        .player-streak {
            background: #e9f0f7;
            padding: 3px 8px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #2c6e9e;
            white-space: nowrap;
        }
        .score-value {
            font-weight: 800;
            font-size: 1rem;
            color: #1e5a88;
        }
        .win-loss {
            font-size: 0.7rem;
            color: #6f8daa;
            white-space: nowrap;
        }
        /* 約戰大廳 & 資訊 */
        .battle-lobby, .info-panel {
            background: #ffffffdd;
            backdrop-filter: blur(4px);
            border-radius: 24px;
            border: 1px solid rgba(44,110,158,0.2);
            overflow: hidden;
        }
        .lobby-header, .info-block h3 {
            padding: 14px 16px;
            background: linear-gradient(90deg, #fafdff, #f0f6fe);
            border-bottom: 2px solid #2c6e9e;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .create-room-btn {
            background: #2c6e9e;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            margin: 16px;
            width: calc(100% - 32px);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .room-list {
            padding: 0 12px 20px;
            max-height: 340px;
            overflow-y: auto;
        }
        .room-card {
            background: #f8fbfe;
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #e2edf6;
        }
        .room-title {
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .room-detail {
            font-size: 0.7rem;
            color: #5a7e9c;
            margin: 8px 0;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .join-btn {
            background: transparent;
            border: 1px solid #2c6e9e;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
        }
        .info-block {
            padding: 0 0 16px 0;
        }
        .rule-list {
            list-style: none;
            padding: 0 16px;
        }
        .rule-list li {
            font-size: 0.75rem;
            padding: 8px 0;
            border-bottom: 1px solid #e9f0f7;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .stat-badge {
            background: #eef3fc;
            border-radius: 20px;
            padding: 12px;
            margin: 12px 16px;
            text-align: center;
        }
        .stat-number {
            font-size: 1.4rem;
            font-weight: 800;
        }
        .double-stats {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        .stat-item {
            flex: 1;
            background: white;
            border-radius: 16px;
            padding: 6px;
        }
        footer {
            margin-top: 28px;
            text-align: center;
            font-size: 0.65rem;
            padding: 16px 0 8px;
            color: #6c8eaa;
            border-top: 1px solid #d4e2f0;
        }
        /* Modal 樣式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-container {
            background: white;
            width: 88%;
            max-width: 400px;
            border-radius: 32px;
            overflow: hidden;
        }
        .modal-header {
            padding: 16px 20px;
            background: #fafdff;
            border-bottom: 2px solid #2c6e9e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-close {
            font-size: 1.6rem;
            background: none;
            border: none;
            cursor: pointer;
        }
        .modal-body {
            padding: 20px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            margin-bottom: 6px;
            font-weight: 600;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #cbdde9;
            border-radius: 40px;
            font-size: 0.9rem;
        }
        .tab-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .tab-btn {
            flex: 1;
            background: #eef2f8;
            border: none;
            padding: 10px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
        }
        .tab-btn.active {
            background: #2c6e9e;
            color: white;
        }
        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }
        .emoji-option {
            font-size: 1.8rem;
            text-align: center;
            cursor: pointer;
            padding: 6px;
            background: #f0f6fc;
            border-radius: 12px;
        }
        .avatar-preview {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #eef2f8;
            margin: 10px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        /* Popup 彈窗 */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
        }
        .popup-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .popup-container {
            background: white;
            width: 88%;
            max-width: 380px;
            border-radius: 32px;
            overflow: hidden;
        }
        .popup-header {
            padding: 16px 20px;
            background: #fafdff;
            border-bottom: 2px solid #2c6e9e;
            display: flex;
            justify-content: space-between;
        }
        .popup-close {
            font-size: 1.6rem;
            background: none;
            border: none;
            cursor: pointer;
        }
        .popup-body {
            padding: 20px;
        }
        .popup-avatar {
            display: flex;
            justify-content: center;
            margin-bottom: 16px;
        }
        .avatar-large {
            width: 80px;
            height: 80px;
            background: #eaf3fc;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            overflow: hidden;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #ecf3fa;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 12px;
        }
        .stat-card {
            background: #f0f6fc;
            padding: 8px;
            text-align: center;
            border-radius: 16px;
            font-size: 0.8rem;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 6px;
            padding: 12px;
            flex-wrap: wrap;
        }
        .page-btn {
            background: transparent;
            border: 1px solid #c0d4e8;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .page-btn.active {
            background: #2c6e9e;
            color: white;
        }
        button, .join-btn, .page-btn {
            touch-action: manipulation;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 頂欄 -->
    <div class="navbar">
        <div class="logo-area">
            <h1><i class="fas fa-bezier-curve"></i> 天馬陀螺戰榜</h1>
            <p>香港街頭對戰 · 即時排名</p>
        </div>
        <button class="menu-btn" id="menuToggleBtn"><span></span><span></span><span></span></button>
    </div>

    <!-- 側邊選單 -->
    <div class="side-menu" id="sideMenu">
        <div class="menu-header">
            <div class="user-icon-large" id="sideUserAvatar">🏆</div>
            <div id="sideUserName">訪客</div>
        </div>
        <ul class="menu-items">
            <li><a id="loginMenuItem"><i class="fas fa-sign-in-alt"></i> 登入 / 註冊</a></li>
            <li><a id="myProfileMenuItem"><i class="fas fa-id-card"></i> 我的檔案</a></li>
            <li><a id="battleHistoryMenuItem"><i class="fas fa-history"></i> 對戰紀錄</a></li>
            <li><a id="scanBattleMenuItem"><i class="fas fa-qrcode"></i> 掃碼對戰</a></li>
            <li><a id="rulesMenuItem"><i class="fas fa-info-circle"></i> 排行榜說明</a></li>
        </ul>
    </div>
    <div class="overlay" id="overlay"></div>

    <!-- 搜尋列 -->
    <div class="search-bar">
        <input type="text" class="search-input" id="searchInput" placeholder="玩家名稱 或 數字ID">
        <button class="search-btn" id="searchBtn"><i class="fas fa-search"></i> 搜尋</button>
        <button class="clear-btn" id="clearSearchBtn"><i class="fas fa-times"></i> 清除</button>
    </div>
    <div id="searchResultInfo" class="search-result-info"></div>

    <div class="dashboard">
        <!-- 排名榜 -->
        <div class="rank-panel">
            <div class="panel-header">
                <h2><i class="fas fa-trophy"></i> 戰士排行</h2>
                <div class="pagination-info" id="paginationInfo">-</div>
            </div>
            <div class="table-wrapper">
                <table class="rank-table" id="rankTable">
                    <thead>
                        <tr><th>排名</th><th>戰士</th><th>積分</th><th>連勝</th><th>戰績</th></tr>
                    </thead>
                    <tbody id="rankTbody"><tr><td colspan="5">載入中...</td></tr></tbody>
                </table>
            </div>
            <div class="pagination" id="paginationControls"></div>
        </div>

        <!-- 約戰大廳 -->
        <div class="battle-lobby">
            <div class="lobby-header"><i class="fas fa-users"></i> 約戰大廳</div>
            <button class="create-room-btn" id="createRoomBtn"><i class="fas fa-plus-circle"></i> 開設陀螺房間</button>
            <div class="room-list" id="roomList">載入中...</div>
        </div>

        <!-- 規則資訊 -->
        <div class="info-panel">
            <div class="info-block">
                <h3><i class="fas fa-dice-d6"></i> 積分規則</h3>
                <ul class="rule-list">
                    <li><i class="fas fa-star"></i> 初始1000分</li>
                    <li><i class="fas fa-bolt"></i> 勝者奪敗者10% (上限150)</li>
                    <li><i class="fas fa-shield-alt"></i> 新手保護 ≤500分扣5%</li>
                    <li><i class="fas fa-clock"></i> 同一對手24hr一次</li>
                    <li><i class="fas fa-fire"></i> 連勝加成: 3連勝+2%</li>
                </ul>
                <div class="stat-badge">
                    <div class="stat-number" id="totalPlayersCount">0</div>
                    <div>活躍鬥士</div>
                    <div class="double-stats">
                        <div class="stat-item"><div class="stat-number" id="highestStreak">0</div><div>最高連勝</div></div>
                        <div class="stat-item"><div class="stat-number" id="weeklyChampion">-</div><div>陀螺王</div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer><i class="fas fa-bezier-curve"></i> 香港爆旋陀螺協會 · 公平競技</footer>
</div>

<!-- 玩家詳細 Popup -->
<div class="popup-overlay" id="popupOverlay">
    <div class="popup-container">
        <div class="popup-header"><h3 id="popupName">玩家</h3><button class="popup-close" id="popupCloseBtn">&times;</button></div>
        <div class="popup-body" id="popupBody"></div>
    </div>
</div>

<!-- 登入/註冊 Modal -->
<div class="modal-overlay" id="authModal">
    <div class="modal-container">
        <div class="modal-header"><h3>帳號</h3><button class="modal-close" id="closeAuthBtn">&times;</button></div>
        <div class="modal-body">
            <div class="tab-buttons">
                <button class="tab-btn active" id="loginTabBtn">登入</button>
                <button class="tab-btn" id="registerTabBtn">註冊</button>
            </div>
            <div id="loginForm">
                <div class="form-group">
                    <label>玩家ID (5位數字)</label>
                    <input type="text" id="loginId" placeholder="例如 12345" maxlength="5">
                </div>
                <div class="form-group">
                    <label>密碼</label>
                    <input type="password" id="loginPassword" placeholder="密碼">
                </div>
                <button id="doLoginBtn" style="width:100%; background:#2c6e9e; color:white; padding:10px; border:none; border-radius:40px;">登入</button>
                <div style="margin-top:12px; text-align:center;">
                    <button id="googleLoginBtn" style="background:#4285F4; color:white; border:none; border-radius:40px; padding:8px 16px;"><i class="fab fa-google"></i> Google 登入</button>
                </div>
                <div class="login-hint" style="font-size:0.7rem; text-align:center; margin-top:12px;">未註冊？請切換至「註冊」建立新帳號</div>
            </div>
            <div id="registerForm" style="display:none;">
                <div class="form-group">
                    <label>戰士名稱</label>
                    <input type="text" id="regName" placeholder="例如 天馬戰士">
                </div>
                <div class="form-group">
                    <label>活躍區域</label>
                    <select id="regDistrict">
                        <option>觀塘區</option><option>油尖旺區</option><option>深水埗區</option><option>九龍城區</option>
                        <option>黃大仙區</option><option>葵青區</option><option>荃灣區</option><option>屯門區</option>
                        <option>元朗區</option><option>北區</option><option>大埔區</option><option>沙田區</option>
                        <option>西貢區</option><option>離島區</option><option>南區</option><option>東區</option>
                        <option>灣仔區</option><option>中西區</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>密碼</label>
                    <input type="password" id="regPassword" placeholder="密碼">
                </div>
                <div class="form-group">
                    <label>頭像 (Emoji 或 上傳)</label>
                    <div class="emoji-grid" id="regEmojiGrid"></div>
                    <label for="regAvatarUpload" style="background:#eef2f8; display:inline-block; padding:6px 12px; border-radius:40px; cursor:pointer;">上傳圖片</label>
                    <input type="file" id="regAvatarUpload" accept="image/*" style="display:none;">
                    <div id="regAvatarPreview" style="margin-top:8px; width:50px; height:50px; border-radius:50%; background:#eef2f8; display:flex; align-items:center; justify-content:center; font-size:1.8rem;">🏆</div>
                </div>
                <button id="doRegisterBtn" style="width:100%; background:#2c6e9e; color:white; padding:10px; border:none; border-radius:40px;">註冊新帳號</button>
            </div>
        </div>
    </div>
</div>

<!-- 編輯檔案 Modal -->
<div class="modal-overlay" id="profileModal">
    <div class="modal-container">
        <div class="modal-header"><h3>編輯我的檔案</h3><button class="modal-close" id="closeProfileBtn">&times;</button></div>
        <div class="modal-body">
            <div class="emoji-grid" id="profileEmojiGrid"></div>
            <div class="upload-area">
                <label for="profileAvatarUpload" style="background:#eef2f8; display:inline-block; padding:6px 12px; border-radius:40px; cursor:pointer;">上傳圖片</label>
                <input type="file" id="profileAvatarUpload" accept="image/*" style="display:none;">
                <div id="profileAvatarPreview" style="margin:10px auto; width:60px; height:60px; border-radius:50%; background:#eef2f8; display:flex; align-items:center; justify-content:center; overflow:hidden;"></div>
            </div>
            <select id="profileDistrict" style="width:100%; padding:10px; margin-top:12px; border-radius:40px;">
                <option>觀塘區</option><option>油尖旺區</option><option>深水埗區</option><option>九龍城區</option>
                <option>黃大仙區</option><option>葵青區</option><option>荃灣區</option><option>屯門區</option>
                <option>元朗區</option><option>北區</option><option>大埔區</option><option>沙田區</option>
                <option>西貢區</option><option>離島區</option><option>南區</option><option>東區</option>
                <option>灣仔區</option><option>中西區</option>
            </select>
            <button id="saveProfileBtn" style="width:100%; margin-top:16px; background:#1e5a88; color:white; padding:10px; border:none; border-radius:40px;">儲存變更</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, getDoc, getDocs, query, orderBy, limit, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyALCq_eK__C_YD-MgMeQAL1enqeMF4hQG4",
        authDomain: "goshoot-ac397.firebaseapp.com",
        projectId: "goshoot-ac397",
        storageBucket: "goshoot-ac397.firebasestorage.app",
        messagingSenderId: "251450080441",
        appId: "1:251450080441:web:613567f18a19a828bcef68",
        measurementId: "G-25J4M3QZPN"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // ---------- 全域變數 ----------
    let currentUser = null;
    let allPlayers = [];
    let filteredPlayers = [];
    let currentPage = 1;
    const itemsPerPage = 15;
    let currentSearchTerm = "";
    let selectedRegAvatar = "🏆";
    let selectedProfileAvatar = null;

    // DOM 元素
    let rankTbody, searchInput, searchBtn, clearBtn, paginationControls, paginationInfo;
    let totalPlayersSpan, highestStreakSpan, weeklyChampionSpan;
    let sideUserAvatar, sideUserName, loginMenuItem;
    let authModal, loginForm, registerForm, loginIdInput, loginPasswordInput, doLoginBtn, googleLoginBtn;
    let regNameInput, regDistrictSelect, regPasswordInput, doRegisterBtn;
    let profileModal, profileAvatarPreview, profileDistrictSelect, saveProfileBtn;
    let popupOverlay, popupName, popupBody, popupCloseBtn;
    let createRoomBtn, roomList;

    // 等待 DOM 載入
    document.addEventListener('DOMContentLoaded', () => {
        rankTbody = document.getElementById("rankTbody");
        searchInput = document.getElementById("searchInput");
        searchBtn = document.getElementById("searchBtn");
        clearBtn = document.getElementById("clearSearchBtn");
        paginationControls = document.getElementById("paginationControls");
        paginationInfo = document.getElementById("paginationInfo");
        totalPlayersSpan = document.getElementById("totalPlayersCount");
        highestStreakSpan = document.getElementById("highestStreak");
        weeklyChampionSpan = document.getElementById("weeklyChampion");
        sideUserAvatar = document.getElementById("sideUserAvatar");
        sideUserName = document.getElementById("sideUserName");
        loginMenuItem = document.getElementById("loginMenuItem");
        authModal = document.getElementById("authModal");
        loginForm = document.getElementById("loginForm");
        registerForm = document.getElementById("registerForm");
        loginIdInput = document.getElementById("loginId");
        loginPasswordInput = document.getElementById("loginPassword");
        doLoginBtn = document.getElementById("doLoginBtn");
        googleLoginBtn = document.getElementById("googleLoginBtn");
        regNameInput = document.getElementById("regName");
        regDistrictSelect = document.getElementById("regDistrict");
        regPasswordInput = document.getElementById("regPassword");
        doRegisterBtn = document.getElementById("doRegisterBtn");
        profileModal = document.getElementById("profileModal");
        profileAvatarPreview = document.getElementById("profileAvatarPreview");
        profileDistrictSelect = document.getElementById("profileDistrict");
        saveProfileBtn = document.getElementById("saveProfileBtn");
        popupOverlay = document.getElementById("popupOverlay");
        popupName = document.getElementById("popupName");
        popupBody = document.getElementById("popupBody");
        popupCloseBtn = document.getElementById("popupCloseBtn");
        createRoomBtn = document.getElementById("createRoomBtn");
        roomList = document.getElementById("roomList");

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = await getOrCreatePlayer(user);
                updateSidebar();
                closeAuthModal();
                loadRankings();
            } else {
                currentUser = null;
                updateSidebar();
            }
        });

        loadRankings();

        searchBtn.addEventListener("click", () => searchPlayers(searchInput.value));
        clearBtn.addEventListener("click", () => { searchInput.value = ""; searchPlayers(""); });
        searchInput.addEventListener("keypress", (e) => { if (e.key === "Enter") searchPlayers(searchInput.value); });
        loginMenuItem.addEventListener("click", (e) => { e.preventDefault(); if (currentUser) logout(); else openAuthModal(); closeMenu(); });
        document.getElementById("myProfileMenuItem")?.addEventListener("click", (e) => { e.preventDefault(); openProfileModal(); closeMenu(); });
        document.getElementById("battleHistoryMenuItem")?.addEventListener("click", () => { alert("對戰紀錄開發中"); closeMenu(); });
        document.getElementById("scanBattleMenuItem")?.addEventListener("click", () => { if (!currentUser) alert("請先登入"); else alert("掃碼對戰開發中"); closeMenu(); });
        document.getElementById("rulesMenuItem")?.addEventListener("click", () => { alert("排行榜說明：\n- 初始1000分\n- 勝者奪敗者10%積分..."); closeMenu(); });
        createRoomBtn.addEventListener("click", () => { if (!currentUser) alert("請先登入"); else alert("開設房間功能開發中"); });
        renderRooms();

        document.getElementById("closeAuthBtn").addEventListener("click", closeAuthModal);
        authModal.addEventListener("click", (e) => { if (e.target === authModal) closeAuthModal(); });
        document.getElementById("loginTabBtn").addEventListener("click", () => switchAuthTab('login'));
        document.getElementById("registerTabBtn").addEventListener("click", () => switchAuthTab('register'));
        doLoginBtn.addEventListener("click", doLogin);
        googleLoginBtn.addEventListener("click", googleLogin);
        doRegisterBtn.addEventListener("click", doRegister);
        document.getElementById("closeProfileBtn").addEventListener("click", closeProfileModal);
        profileModal.addEventListener("click", (e) => { if (e.target === profileModal) closeProfileModal(); });
        saveProfileBtn.addEventListener("click", saveProfile);
        popupCloseBtn.addEventListener("click", closePopup);
        popupOverlay.addEventListener("click", (e) => { if (e.target === popupOverlay) closePopup(); });

        const menuBtn = document.getElementById("menuToggleBtn");
        const sideMenu = document.getElementById("sideMenu");
        const overlay = document.getElementById("overlay");
        menuBtn.addEventListener("click", () => { sideMenu.classList.add("open"); overlay.classList.add("active"); });
        overlay.addEventListener("click", () => { sideMenu.classList.remove("open"); overlay.classList.remove("active"); });

        setupRegisterEmoji();
        setupProfileEmoji();
    });

    async function getOrCreatePlayer(firebaseUser) {
        const playerRef = doc(db, "players", firebaseUser.uid);
        const docSnap = await getDoc(playerRef);
        if (docSnap.exists()) {
            return { id: firebaseUser.uid, ...docSnap.data() };
        } else {
            const numericId = Math.floor(10000 + Math.random() * 90000);
            const newPlayer = {
                player_number: numericId,
                name: firebaseUser.displayName || "新戰士",
                avatar: "🏆",
                district: "觀塘區",
                score: 1000,
                streak: 0,
                wins: 0,
                losses: 0,
                ties: 0,
                email: firebaseUser.email
            };
            await setDoc(playerRef, newPlayer);
            return { id: firebaseUser.uid, ...newPlayer };
        }
    }

    async function loadRankings() {
        const q = query(collection(db, "players"), orderBy("score", "desc"), limit(200));
        const querySnapshot = await getDocs(q);
        allPlayers = [];
        querySnapshot.forEach(doc => {
            allPlayers.push({ id: doc.id, ...doc.data() });
        });
        filteredPlayers = [...allPlayers];
        renderRanking();
    }

    async function updatePlayerProfile(avatar, district) {
        if (!currentUser) return;
        const playerRef = doc(db, "players", currentUser.id);
        await updateDoc(playerRef, { avatar, district });
        currentUser.avatar = avatar;
        currentUser.district = district;
        updateSidebar();
        loadRankings();
    }

    async function doLogin() {
        const numericId = loginIdInput.value.trim();
        const password = loginPasswordInput.value;
        if (!numericId || !password) { alert("請輸入數字ID和密碼"); return; }
        const email = numericId + "@gyro.local";
        try {
            await signInWithEmailAndPassword(auth, email, password);
        } catch (error) {
            alert("登入失敗：" + error.message);
        }
    }

    async function googleLogin() {
        try {
            await signInWithPopup(auth, provider);
        } catch (error) {
            alert("Google 登入失敗：" + error.message);
        }
    }

    async function doRegister() {
        const name = regNameInput.value.trim();
        const district = regDistrictSelect.value;
        const password = regPasswordInput.value;
        if (!name || !password) { alert("請填寫名稱和密碼"); return; }
        const numericId = Math.floor(10000 + Math.random() * 90000);
        const email = numericId + "@gyro.local";
        try {
            const userCred = await createUserWithEmailAndPassword(auth, email, password);
            const uid = userCred.user.uid;
            const newPlayer = {
                player_number: numericId,
                name: name,
                avatar: selectedRegAvatar,
                district: district,
                score: 1000,
                streak: 0,
                wins: 0,
                losses: 0,
                ties: 0,
                email: email
            };
            await setDoc(doc(db, "players", uid), newPlayer);
            alert(`註冊成功！您的玩家ID是 ${numericId}，請用此ID登入。`);
            switchAuthTab('login');
        } catch (error) {
            alert("註冊失敗：" + error.message);
        }
    }

    async function logout() {
        await signOut(auth);
    }

    function updateSidebar() {
        if (currentUser) {
            const av = currentUser.avatar;
            if (av && av.startsWith("http")) {
                sideUserAvatar.innerHTML = `<img src="${av}">`;
            } else {
                sideUserAvatar.innerHTML = av || "🏆";
            }
            sideUserName.innerText = currentUser.name;
            loginMenuItem.innerHTML = '<i class="fas fa-sign-out-alt"></i> 登出';
        } else {
            sideUserAvatar.innerHTML = "🏆";
            sideUserName.innerText = "訪客";
            loginMenuItem.innerHTML = '<i class="fas fa-sign-in-alt"></i> 登入 / 註冊';
        }
    }

    function openAuthModal() { authModal.classList.add("active"); }
    function closeAuthModal() { authModal.classList.remove("active"); }
    function switchAuthTab(tab) {
        if (tab === 'login') {
            loginForm.style.display = "block";
            registerForm.style.display = "none";
            document.getElementById("loginTabBtn").classList.add("active");
            document.getElementById("registerTabBtn").classList.remove("active");
        } else {
            loginForm.style.display = "none";
            registerForm.style.display = "block";
            document.getElementById("loginTabBtn").classList.remove("active");
            document.getElementById("registerTabBtn").classList.add("active");
        }
    }

    function openProfileModal() {
        if (!currentUser) { alert("請先登入"); return; }
        const av = currentUser.avatar;
        if (av && av.startsWith("http")) {
            profileAvatarPreview.innerHTML = `<img src="${av}" style="width:100%; height:100%; object-fit:cover;">`;
        } else {
            profileAvatarPreview.innerHTML = `<div style="font-size:2rem;">${av || "🏆"}</div>`;
        }
        profileDistrictSelect.value = currentUser.district || "觀塘區";
        profileModal.classList.add("active");
    }
    function closeProfileModal() { profileModal.classList.remove("active"); }
    async function saveProfile() {
        const newAvatar = selectedProfileAvatar || currentUser.avatar;
        const newDistrict = profileDistrictSelect.value;
        await updatePlayerProfile(newAvatar, newDistrict);
        closeProfileModal();
        alert("檔案已更新");
    }

    function setupRegisterEmoji() {
        const emojis = ["🦅","🐉","🦁","🐺","🦄","🔥","🦈","⚔️","🛡️","🌟","🌊","⚡","❄️","🌙","🎯"];
        const grid = document.getElementById("regEmojiGrid");
        grid.innerHTML = emojis.map(e => `<div class="emoji-option" data-emoji="${e}">${e}</div>`).join("");
        document.querySelectorAll("#regEmojiGrid .emoji-option").forEach(el => {
            el.addEventListener("click", () => {
                selectedRegAvatar = el.getAttribute("data-emoji");
                document.getElementById("regAvatarPreview").innerHTML = `<div style="font-size:1.8rem;">${selectedRegAvatar}</div>`;
            });
        });
        const upload = document.getElementById("regAvatarUpload");
        upload.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    selectedRegAvatar = ev.target.result;
                    document.getElementById("regAvatarPreview").innerHTML = `<img src="${selectedRegAvatar}" style="width:100%; height:100%; object-fit:cover; border-radius:50%;">`;
                };
                reader.readAsDataURL(file);
            }
        };
    }

    function setupProfileEmoji() {
        const emojis = ["🦅","🐉","🦁","🐺","🦄","🔥","🦈","⚔️","🛡️","🌟","🌊","⚡","❄️","🌙","🎯"];
        const grid = document.getElementById("profileEmojiGrid");
        grid.innerHTML = emojis.map(e => `<div class="emoji-option" data-emoji="${e}">${e}</div>`).join("");
        document.querySelectorAll("#profileEmojiGrid .emoji-option").forEach(el => {
            el.addEventListener("click", () => {
                selectedProfileAvatar = el.getAttribute("data-emoji");
                profileAvatarPreview.innerHTML = `<div style="font-size:2rem;">${selectedProfileAvatar}</div>`;
            });
        });
        const upload = document.getElementById("profileAvatarUpload");
        upload.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    selectedProfileAvatar = ev.target.result;
                    profileAvatarPreview.innerHTML = `<img src="${selectedProfileAvatar}" style="width:100%; height:100%; object-fit:cover;">`;
                };
                reader.readAsDataURL(file);
            }
        };
    }

    function renderRanking() {
        if (!rankTbody) return;
        const start = (currentPage - 1) * itemsPerPage;
        const pagePlayers = filteredPlayers.slice(start, start + itemsPerPage);
        if (pagePlayers.length === 0) { rankTbody.innerHTML = "<td><td colspan='5'>暫無資料</td></tr>"; return; }
        let html = "";
        pagePlayers.forEach(p => {
            const rank = allPlayers.findIndex(p2 => p2.id === p.id) + 1;
            let avatarHtml = p.avatar;
            if (p.avatar && p.avatar.startsWith("http")) {
                avatarHtml = `<img src="${p.avatar}" style="width:100%; height:100%; object-fit:cover; border-radius:50%;">`;
            }
            html += `<tr data-id="${p.id}">
                <td class="rank-number">${rank}</td>
                <td class="player-name-cell"><span class="player-avatar">${avatarHtml}</span> ${p.name} <span class="player-id">(${p.player_number})</span></td>
                <td class="score-value">${p.score}</td>
                <td><span class="player-streak">${p.streak}連勝</span></td>
                <td class="win-loss">${p.wins}勝 ${p.losses}敗 ${p.ties}平</td>
            </tr>`;
        });
        rankTbody.innerHTML = html;
        document.querySelectorAll("#rankTbody tr").forEach(row => {
            row.addEventListener("click", () => {
                const pid = row.getAttribute("data-id");
                const player = allPlayers.find(p => p.id === pid);
                if (player) showPlayerPopup(player);
            });
        });
        paginationInfo.innerText = `${start+1}-${Math.min(start+itemsPerPage, filteredPlayers.length)} / ${filteredPlayers.length}`;
        totalPlayersSpan.innerText = allPlayers.length;
        const maxStreak = Math.max(...allPlayers.map(p => p.streak || 0), 0);
        highestStreakSpan.innerText = maxStreak;
        if (allPlayers.length) weeklyChampionSpan.innerText = allPlayers[0].name;
        renderPagination();
    }

    function renderPagination() {
        const totalPages = Math.ceil(filteredPlayers.length / itemsPerPage);
        if (totalPages <= 1) { paginationControls.innerHTML = ""; return; }
        let html = `<button class="page-btn" data-page="${currentPage-1}" ${currentPage===1 ? 'disabled' : ''}>〈 上一頁</button>`;
        for (let i = Math.max(1, currentPage-2); i <= Math.min(totalPages, currentPage+2); i++)
            html += `<button class="page-btn ${i===currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
        html += `<button class="page-btn" data-page="${currentPage+1}" ${currentPage===totalPages ? 'disabled' : ''}>下一頁 〉</button>`;
        paginationControls.innerHTML = html;
        document.querySelectorAll(".page-btn").forEach(btn => {
            if (!btn.disabled && btn.dataset.page)
                btn.addEventListener("click", () => { currentPage = parseInt(btn.dataset.page); renderRanking(); });
        });
    }

    function searchPlayers(term) {
        currentSearchTerm = term.trim().toLowerCase();
        if (!currentSearchTerm) filteredPlayers = [...allPlayers];
        else filteredPlayers = allPlayers.filter(p => p.name.toLowerCase().includes(currentSearchTerm) || p.player_number.toString().includes(currentSearchTerm));
        currentPage = 1;
        renderRanking();
    }

    function showPlayerPopup(player) {
        const rank = allPlayers.findIndex(p => p.id === player.id) + 1;
        const total = player.wins + player.losses + player.ties;
        const winRate = total ? Math.round(player.wins / total * 100) : 0;
        let avatarHtml = player.avatar;
        if (player.avatar && player.avatar.startsWith("http")) {
            avatarHtml = `<img src="${player.avatar}" style="width:100%; height:100%; object-fit:cover;">`;
        }
        popupName.innerText = player.name;
        popupBody.innerHTML = `
            <div class="popup-avatar"><div class="avatar-large">${avatarHtml}</div></div>
            <div class="info-row"><span>玩家ID</span><span>${player.player_number}</span></div>
            <div class="info-row"><span>活躍區域</span><span>${player.district || "未設定"}</span></div>
            <div class="info-row"><span>全港排名</span><span>第 ${rank}</span></div>
            <div class="info-row"><span>積分</span><span>${player.score}</span></div>
            <div class="info-row"><span>連勝</span><span>${player.streak}</span></div>
            <div class="stats-grid"><div class="stat-card">${player.wins}<br>勝</div><div class="stat-card">${player.losses}<br>敗</div><div class="stat-card">${player.ties}<br>平</div><div class="stat-card">${winRate}%<br>勝率</div></div>
        `;
        popupOverlay.classList.add("active");
    }
    function closePopup() { popupOverlay.classList.remove("active"); }

    function renderRooms() {
        const mockRooms = [
            { id:"rm1", host:"星穹天馬", location:"維園草地", time:"今晚 8:00", players:2, max:4 },
            { id:"rm2", host:"銀翼龍騎", location:"麥花臣球場", time:"明日 15:00", players:1, max:4 }
        ];
        if (!roomList) return;
        if (mockRooms.length === 0) { roomList.innerHTML = "<div style='text-align:center;padding:20px'>暫無約戰</div>"; return; }
        let html = "";
        mockRooms.forEach(r => {
            html += `<div class="room-card"><div class="room-title"><span><i class="fas fa-gamepad"></i> ${r.host} 的房間</span><button class="join-btn" data-id="${r.id}">加入</button></div>
            <div class="room-detail"><i class="fas fa-map-marker-alt"></i> ${r.location} &nbsp; <i class="far fa-clock"></i> ${r.time}</div>
            <div class="room-detail"><i class="fas fa-user-friends"></i> ${r.players}/${r.max} 人</div></div>`;
        });
        roomList.innerHTML = html;
        document.querySelectorAll(".join-btn").forEach(btn => {
            btn.addEventListener("click", (e) => { e.stopPropagation(); if (!currentUser) alert("請先登入"); else alert("預約功能開發中"); });
        });
    }

    function closeMenu() {
        const sideMenu = document.getElementById("sideMenu");
        const overlay = document.getElementById("overlay");
        if (sideMenu) sideMenu.classList.remove("open");
        if (overlay) overlay.classList.remove("active");
    }
</script>
</body>
</html>
