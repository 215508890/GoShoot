<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>爆旋陀螺 · 天馬戰榜 | 香港排名</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(145deg, #f0f4fc 0%, #e6edf6 100%); font-family: system-ui, 'Segoe UI', sans-serif; }
        .container { max-width: 1200px; margin: 0 auto; padding: 16px 12px; }
        .navbar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; padding-bottom: 12px; border-bottom: 2px solid rgba(44,110,158,0.3); margin-bottom: 20px; }
        .logo-area h1 { font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, #1e4a76, #2c7ab8); -webkit-background-clip: text; background-clip: text; color: transparent; display: flex; align-items: center; gap: 8px; }
        .menu-btn { background: rgba(255,255,255,0.8); border: 1px solid #c0d4e8; padding: 8px 12px; border-radius: 10px; display: flex; flex-direction: column; gap: 4px; cursor: pointer; }
        .menu-btn span { width: 22px; height: 2px; background: #2c6280; display: block; }
        .side-menu { position: fixed; top: 0; right: -280px; width: 280px; height: 100%; background: rgba(255,255,255,0.98); transition: right 0.25s ease; z-index: 1000; border-left: 1px solid #cde3f5; }
        .side-menu.open { right: 0; }
        .menu-header { padding: 20px 16px; border-bottom: 1px solid #e0ecf8; display: flex; align-items: center; gap: 12px; }
        .user-icon-large { width: 48px; height: 48px; background: #e0edfc; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; overflow: hidden; }
        .menu-items { list-style: none; padding: 12px 0; }
        .menu-items li { padding: 12px 20px; border-bottom: 1px solid #ecf3fa; }
        .menu-items li a { text-decoration: none; color: #2c5a7a; font-weight: 500; display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); opacity: 0; visibility: hidden; transition: 0.2s; z-index: 999; }
        .overlay.active { opacity: 1; visibility: visible; }
        .search-bar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .search-input { flex: 1; padding: 12px 16px; border: 1px solid #cbdde9; border-radius: 44px; font-size: 0.9rem; }
        .search-btn, .clear-btn { padding: 12px 20px; border-radius: 44px; font-weight: 600; border: none; cursor: pointer; }
        .search-btn { background: #2c6e9e; color: white; }
        .clear-btn { background: #eef2f8; color: #2c5a7a; border: 1px solid #cbdde9; }
        .dashboard { display: flex; flex-direction: column; gap: 20px; }
        .rank-panel { background: #ffffffdd; border-radius: 24px; border: 1px solid rgba(44,110,158,0.2); overflow: hidden; }
        .panel-header { padding: 14px 16px; background: linear-gradient(90deg, #fafdff, #f0f6fe); border-bottom: 2px solid #2c6e9e; display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; }
        .table-wrapper { overflow-x: auto; }
        .rank-table { min-width: 580px; width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .rank-table th { text-align: left; padding: 12px; background: #f8fafd; border-bottom: 1px solid #e2edf6; }
        .rank-table td { padding: 12px; border-bottom: 1px solid #ecf3fa; cursor: pointer; }
        .player-avatar { width: 36px; height: 36px; background: #eaf3fc; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 1.2rem; overflow: hidden; }
        .player-streak { background: #e9f0f7; padding: 3px 8px; border-radius: 30px; font-size: 0.7rem; }
        .score-value { font-weight: 800; color: #1e5a88; }
        .battle-lobby, .info-panel { background: #ffffffdd; border-radius: 24px; border: 1px solid rgba(44,110,158,0.2); overflow: hidden; }
        .lobby-header, .info-block h3 { padding: 14px 16px; background: linear-gradient(90deg, #fafdff, #f0f6fe); border-bottom: 2px solid #2c6e9e; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .create-room-btn { background: #2c6e9e; color: white; border: none; padding: 12px; border-radius: 40px; margin: 16px; width: calc(100% - 32px); cursor: pointer; }
        .room-list { padding: 0 12px 20px; max-height: 340px; overflow-y: auto; }
        .room-card { background: #f8fbfe; border-radius: 20px; padding: 12px; margin-bottom: 12px; border: 1px solid #e2edf6; }
        .join-btn { background: transparent; border: 1px solid #2c6e9e; padding: 4px 12px; border-radius: 30px; cursor: pointer; }
        .rule-list { list-style: none; padding: 0 16px; }
        .rule-list li { font-size: 0.75rem; padding: 8px 0; border-bottom: 1px solid #e9f0f7; display: flex; align-items: center; gap: 8px; }
        .stat-badge { background: #eef3fc; border-radius: 20px; padding: 12px; margin: 12px 16px; text-align: center; }
        .stat-number { font-size: 1.4rem; font-weight: 800; }
        .double-stats { display: flex; gap: 12px; margin-top: 8px; }
        .stat-item { flex: 1; background: white; border-radius: 16px; padding: 6px; }
        footer { margin-top: 28px; text-align: center; font-size: 0.65rem; padding: 16px 0 8px; color: #6c8eaa; border-top: 1px solid #d4e2f0; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 2000; opacity: 0; visibility: hidden; transition: 0.2s; padding: 16px; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-container { background: white; width: 100%; max-width: 400px; max-height: 85vh; border-radius: 28px; overflow-y: auto; }
        .modal-header { padding: 16px 20px; background: #fafdff; border-bottom: 2px solid #2c6e9e; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: white; }
        .modal-close { font-size: 1.6rem; background: none; border: none; cursor: pointer; }
        .modal-body { padding: 20px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 0.8rem; margin-bottom: 6px; font-weight: 600; }
        .form-group input, .form-group select { width: 100%; padding: 10px 14px; border: 1px solid #cbdde9; border-radius: 40px; }
        .tab-buttons { display: flex; gap: 12px; margin-bottom: 20px; }
        .tab-btn { flex: 1; background: #eef2f8; border: none; padding: 10px; border-radius: 40px; cursor: pointer; font-weight: 600; }
        .tab-btn.active { background: #2c6e9e; color: white; }
        .emoji-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-bottom: 12px; max-height: 150px; overflow-y: auto; }
        .emoji-option { font-size: 1.6rem; text-align: center; cursor: pointer; padding: 6px; background: #f0f6fc; border-radius: 12px; }
        .avatar-preview { width: 60px; height: 60px; border-radius: 50%; background: #eef2f8; margin: 10px auto; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 2000; opacity: 0; visibility: hidden; transition: 0.2s; padding: 16px; }
        .popup-overlay.active { opacity: 1; visibility: visible; }
        .popup-container { background: white; width: 100%; max-width: 380px; max-height: 85vh; border-radius: 28px; overflow-y: auto; }
        .popup-header { padding: 16px 20px; background: #fafdff; border-bottom: 2px solid #2c6e9e; display: flex; justify-content: space-between; position: sticky; top: 0; background: white; }
        .popup-close { font-size: 1.6rem; background: none; border: none; cursor: pointer; }
        .popup-body { padding: 20px; }
        .avatar-large { width: 80px; height: 80px; background: #eaf3fc; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.8rem; overflow: hidden; }
        .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #ecf3fa; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
        .stat-card { background: #f0f6fc; padding: 8px; text-align: center; border-radius: 16px; }
        .pagination { display: flex; justify-content: center; gap: 6px; padding: 12px; flex-wrap: wrap; }
        .page-btn { background: transparent; border: 1px solid #c0d4e8; padding: 6px 12px; border-radius: 30px; cursor: pointer; }
        .page-btn.active { background: #2c6e9e; color: white; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e2a3a; color: white; padding: 10px 20px; border-radius: 40px; font-size: 0.8rem; z-index: 3000; opacity: 0; transition: opacity 0.3s; pointer-events: none; text-align: center; max-width: 80%; }
        .toast.show { opacity: 1; }
        .loading-spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 6px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <div class="navbar">
        <div class="logo-area">
            <h1><i class="fas fa-bezier-curve"></i> 天馬陀螺戰榜</h1>
            <p>香港街頭對戰 · 即時排名</p>
        </div>
        <button class="menu-btn" id="menuToggleBtn"><span></span><span></span><span></span></button>
    </div>

    <div class="side-menu" id="sideMenu">
        <div class="menu-header">
            <div class="user-icon-large" id="sideUserAvatar">🏆</div>
            <div id="sideUserName">訪客</div>
        </div>
        <ul class="menu-items">
            <li><a id="loginMenuItem"><i class="fas fa-sign-in-alt"></i> 登入 / 註冊</a></li>
            <li><a id="myProfileMenuItem"><i class="fas fa-id-card"></i> 我的檔案</a></li>
            <li><a id="battleHistoryMenuItem"><i class="fas fa-history"></i> 對戰紀錄</a></li>
            <li><a id="scanBattleMenuItem"><i class="fas fa-qrcode"></i> 掃碼對戰</a></li>
            <li><a id="rulesMenuItem"><i class="fas fa-info-circle"></i> 排行榜說明</a></li>
        </ul>
    </div>
    <div class="overlay" id="overlay"></div>

    <div class="search-bar">
        <input type="text" class="search-input" id="searchInput" placeholder="搜尋玩家名稱">
        <button class="search-btn" id="searchBtn"><i class="fas fa-search"></i> 搜尋</button>
        <button class="clear-btn" id="clearSearchBtn"><i class="fas fa-times"></i> 清除</button>
    </div>

    <div class="dashboard">
        <div class="rank-panel">
            <div class="panel-header">
                <h2><i class="fas fa-trophy"></i> 戰士排行</h2>
                <div class="pagination-info" id="paginationInfo">-</div>
            </div>
            <div class="table-wrapper">
                <table class="rank-table" id="rankTable">
                    <thead><tr><th>排名</th><th>戰士</th><th>積分</th><th>連勝</th><th>戰績</th></tr></thead>
                    <tbody id="rankTbody"><tr><td colspan="5">載入中...<\/td><\/tr><\/tbody>
                <\/table>
            <\/div>
            <div class="pagination" id="paginationControls"><\/div>
        <\/div>

        <div class="battle-lobby">
            <div class="lobby-header"><i class="fas fa-users"><\/i> 約戰大廳<\/div>
            <button class="create-room-btn" id="createRoomBtn"><i class="fas fa-plus-circle"><\/i> 開設陀螺房間<\/button>
            <div class="room-list" id="roomList">載入中...<\/div>
        <\/div>

        <div class="info-panel">
            <div class="info-block">
                <h3><i class="fas fa-dice-d6"><\/i> 積分規則<\/h3>
                <ul class="rule-list">
                    <li><i class="fas fa-star"><\/i> 初始1000分<\/li>
                    <li><i class="fas fa-bolt"><\/i> 勝者奪敗者10% (上限150)<\/li>
                    <li><i class="fas fa-shield-alt"><\/i> 新手保護 ≤500分扣5%<\/li>
                    <li><i class="fas fa-clock"><\/i> 同一對手24hr一次<\/li>
                    <li><i class="fas fa-fire"><\/i> 連勝加成: 3連勝+2%<\/li>
                <\/ul>
                <div class="stat-badge">
                    <div class="stat-number" id="totalPlayersCount">0<\/div>
                    <div>活躍鬥士<\/div>
                    <div class="double-stats">
                        <div class="stat-item"><div class="stat-number" id="highestStreak">0<\/div><div>最高連勝<\/div><\/div>
                        <div class="stat-item"><div class="stat-number" id="weeklyChampion">-<\/div><div>陀螺王<\/div><\/div>
                    <\/div>
                <\/div>
            <\/div>
        <\/div>
    <\/div>
    <footer><i class="fas fa-bezier-curve"><\/i> 香港爆旋陀螺協會 · 公平競技<\/footer>
<\/div>

<!-- 登入/註冊 Modal -->
<div class="modal-overlay" id="authModal">
    <div class="modal-container">
        <div class="modal-header"><h3>帳號<\/h3><button class="modal-close" id="closeAuthBtn">&times;<\/button><\/div>
        <div class="modal-body">
            <div class="tab-buttons">
                <button class="tab-btn active" id="loginTabBtn">登入<\/button>
                <button class="tab-btn" id="registerTabBtn">註冊<\/button>
            <\/div>
            <div id="loginForm">
                <div class="form-group"><label>電子郵件</label><input type="email" id="loginEmail" placeholder="your@email.com"><\/div>
                <div class="form-group"><label>密碼</label><input type="password" id="loginPassword" placeholder="密碼"><\/div>
                <button id="doLoginBtn" style="width:100%; background:#2c6e9e; color:white; padding:10px; border:none; border-radius:40px;">登入<\/button>
            <\/div>
            <div id="registerForm" style="display:none;">
                <div class="form-group"><label>電子郵件</label><input type="email" id="regEmail" placeholder="your@email.com"><\/div>
                <div class="form-group"><label>戰士名稱</label><input type="text" id="regName" placeholder="例如 天馬戰士"><\/div>
                <div class="form-group"><label>活躍區域</label>
                    <select id="regDistrict">
                        <option>觀塘區</option><option>油尖旺區</option><option>深水埗區</option><option>九龍城區</option>
                        <option>黃大仙區</option><option>葵青區</option><option>荃灣區</option><option>屯門區</option>
                        <option>元朗區</option><option>北區</option><option>大埔區</option><option>沙田區</option>
                        <option>西貢區</option><option>離島區</option><option>南區</option><option>東區</option>
                        <option>灣仔區</option><option>中西區</option>
                    <\/select>
                <\/div>
                <div class="form-group"><label>密碼</label><input type="password" id="regPassword" placeholder="至少6位"><\/div>
                <div class="form-group"><label>確認密碼</label><input type="password" id="regConfirmPassword" placeholder="再次輸入密碼"><\/div>
                <div class="form-group"><label>頭像</label>
                    <div class="emoji-grid" id="regEmojiGrid"><\/div>
                    <label for="regAvatarUpload" style="background:#eef2f8; display:inline-block; padding:6px 12px; border-radius:40px; cursor:pointer;">📷 上傳圖片<\/label>
                    <input type="file" id="regAvatarUpload" accept="image/*" style="display:none;">
                    <div id="regAvatarPreview" class="avatar-preview" style="font-size:1.8rem;">🏆<\/div>
                <\/div>
                <button id="doRegisterBtn" style="width:100%; background:#2c6e9e; color:white; padding:10px; border:none; border-radius:40px;">註冊<\/button>
            <\/div>
        <\/div>
    <\/div>
<\/div>

<!-- 編輯檔案 Modal -->
<div class="modal-overlay" id="profileModal">
    <div class="modal-container">
        <div class="modal-header"><h3>編輯我的檔案<\/h3><button class="modal-close" id="closeProfileBtn">&times;<\/button><\/div>
        <div class="modal-body">
            <div class="emoji-grid" id="profileEmojiGrid"><\/div>
            <div class="upload-area">
                <label for="profileAvatarUpload" style="background:#eef2f8; display:inline-block; padding:6px 12px; border-radius:40px; cursor:pointer;">📷 上傳圖片<\/label>
                <input type="file" id="profileAvatarUpload" accept="image/*" style="display:none;">
                <div id="profileAvatarPreview" class="avatar-preview"><\/div>
            <\/div>
            <select id="profileDistrict" style="width:100%; padding:10px; margin-top:12px; border-radius:40px;">
                <option>觀塘區</option><option>油尖旺區</option><option>深水埗區</option><option>九龍城區</option>
                <option>黃大仙區</option><option>葵青區</option><option>荃灣區</option><option>屯門區</option>
                <option>元朗區</option><option>北區</option><option>大埔區</option><option>沙田區</option>
                <option>西貢區</option><option>離島區</option><option>南區</option><option>東區</option>
                <option>灣仔區</option><option>中西區</option>
            <\/select>
            <button id="saveProfileBtn" style="width:100%; margin-top:16px; background:#1e5a88; color:white; padding:10px; border:none; border-radius:40px;">儲存變更<\/button>
        <\/div>
    <\/div>
<\/div>

<div class="popup-overlay" id="popupOverlay">
    <div class="popup-container">
        <div class="popup-header"><h3 id="popupName">玩家<\/h3><button class="popup-close" id="popupCloseBtn">&times;<\/button><\/div>
        <div class="popup-body" id="popupBody"><\/div>
    <\/div>
<\/div>

<div id="toastMessage" class="toast"><\/div>

<script>
    // API 基礎路徑
    const API_BASE = '/gyro_ranking/api/';
    
    // Emoji 列表
    const EMOJIS = ["😀","😎","🥳","😍","🔥","⭐","🦅","🐉","🦁","🐺","🦄","🦈","⚔️","🛡️","🌟","🌊","⚡","❄️","🌙","🎯","🏆","🎮","🔮","💎","🐲","🦸","🦹","🧙","🧝","🐱","🐶","🐼","🐨","🦊","🐸","🐧","🐦","🐝","🌸","🍀","🌿","💧","🌪️","🌈","☀️","🌙"];
    
    let currentUser = null;
    let allPlayers = [];
    let filteredPlayers = [];
    let currentPage = 1;
    const itemsPerPage = 15;
    let selectedRegAvatar = "🏆";
    let selectedProfileAvatar = null;
    
    // DOM 元素
    let rankTbody, searchInput, searchBtn, clearBtn, paginationControls, paginationInfo;
    let totalPlayersSpan, highestStreakSpan, weeklyChampionSpan;
    let sideUserAvatar, sideUserName, loginMenuItem;
    let authModal, loginForm, registerForm, loginEmail, loginPassword, doLoginBtn;
    let regEmail, regName, regDistrict, regPassword, regConfirmPassword, doRegisterBtn;
    let profileModal, profileAvatarPreview, profileDistrict, saveProfileBtn;
    let popupOverlay, popupName, popupBody, popupCloseBtn;
    let createRoomBtn, roomList;
    
    function showToast(msg, isError = false) {
        const toast = document.getElementById("toastMessage");
        toast.textContent = msg;
        toast.style.background = isError ? "#c0392b" : "#1e2a3a";
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 3000);
    }
    
    function setButtonLoading(btn, isLoading) {
        if (!btn) return;
        if (isLoading) {
            btn.dataset.originalText = btn.innerHTML;
            btn.innerHTML = '<span class="loading-spinner"></span> 處理中';
            btn.disabled = true;
        } else {
            btn.innerHTML = btn.dataset.originalText || btn.innerHTML;
            btn.disabled = false;
        }
    }
    
    // 檢查登入狀態
    async function checkLoginStatus() {
        try {
            const response = await fetch(API_BASE + 'check_session.php', {
                credentials: 'include'
            });
            const data = await response.json();
            if (data.success) {
                currentUser = data.user;
                updateSidebarUI();
                loadRankings();
            }
        } catch (error) {
            console.error('檢查登入狀態失敗:', error);
        }
    }
    
    // 登入
    async function doLogin() {
        const email = loginEmail.value.trim();
        const password = loginPassword.value;
        
        if (!email || !password) {
            showToast("請輸入電子郵件和密碼", true);
            return;
        }
        
        setButtonLoading(doLoginBtn, true);
        try {
            const response = await fetch(API_BASE + 'login.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ email: email, password: password })
            });
            const result = await response.json();
            
            if (result.success) {
                currentUser = result.user;
                updateSidebarUI();
                closeAuthModal();
                loadRankings();
                showToast('登入成功');
            } else {
                showToast(result.message, true);
            }
        } catch (error) {
            showToast('登入失敗：' + error.message, true);
        } finally {
            setButtonLoading(doLoginBtn, false);
        }
    }
    
    // 註冊
    async function doRegister() {
        const email = regEmail.value.trim();
        const name = regName.value.trim();
        const district = regDistrict.value;
        const password = regPassword.value;
        const confirmPassword = regConfirmPassword.value;
        
        if (!email) { showToast("請填寫電子郵件", true); return; }
        if (!name) { showToast("請填寫戰士名稱", true); return; }
        if (!password) { showToast("請填寫密碼", true); return; }
        if (password.length < 6) { showToast("密碼至少 6 位", true); return; }
        if (password !== confirmPassword) { showToast("兩次輸入的密碼不一致", true); return; }
        
        setButtonLoading(doRegisterBtn, true);
        try {
            const response = await fetch(API_BASE + 'register.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    email: email,
                    name: name,
                    district: district,
                    password: password,
                    confirm_password: confirmPassword,
                    avatar: selectedRegAvatar
                })
            });
            const result = await response.json();
            
            if (result.success) {
                showToast(result.message);
                setTimeout(() => {
                    alert(`註冊成功！\n\n您的玩家 ID 是：${result.player_number}\n\n請記下此 ID 以便日後登入。\n\n驗證連結已發送至 ${email}，請檢查收件匣（包括垃圾郵件）。`);
                }, 500);
                switchAuthTab('login');
                regEmail.value = "";
                regName.value = "";
                regPassword.value = "";
                regConfirmPassword.value = "";
            } else {
                showToast(result.message, true);
            }
        } catch (error) {
            console.error('註冊錯誤:', error);
            showToast('註冊失敗：' + error.message, true);
        } finally {
            setButtonLoading(doRegisterBtn, false);
        }
    }
    
    // 登出
    async function logout() {
        if (!confirm("確定要登出嗎？")) return;
        try {
            await fetch(API_BASE + 'logout.php', { credentials: 'include' });
            currentUser = null;
            updateSidebarUI();
            loadRankings();
            showToast("已登出");
        } catch (error) {
            showToast("登出失敗", true);
        }
    }
    
    // 更新側邊欄 UI
    function updateSidebarUI() {
        if (currentUser) {
            sideUserAvatar.innerHTML = currentUser.avatar || "🏆";
            sideUserName.innerHTML = currentUser.name;
            loginMenuItem.innerHTML = '<i class="fas fa-sign-out-alt"></i> 登出';
        } else {
            sideUserAvatar.innerHTML = "🏆";
            sideUserName.innerHTML = "訪客";
            loginMenuItem.innerHTML = '<i class="fas fa-sign-in-alt"></i> 登入 / 註冊';
        }
    }
    
    // 更新個人檔案
    async function saveProfile() {
        if (!currentUser) { showToast("請先登入", true); return; }
        const newAvatar = selectedProfileAvatar || currentUser.avatar;
        const newDistrict = profileDistrict.value;
        
        try {
            const response = await fetch(API_BASE + 'update_profile.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ avatar: newAvatar, district: newDistrict })
            });
            const result = await response.json();
            if (result.success) {
                currentUser.avatar = newAvatar;
                currentUser.district = newDistrict;
                updateSidebarUI();
                loadRankings();
                closeProfileModal();
                showToast("檔案已更新");
            } else {
                showToast(result.message, true);
            }
        } catch (error) {
            showToast("更新失敗", true);
        }
    }
    
    // 載入排行榜
    async function loadRankings() {
        try {
            const response = await fetch(API_BASE + 'get_rankings.php');
            const data = await response.json();
            if (Array.isArray(data)) {
                allPlayers = data;
                filteredPlayers = [...allPlayers];
                renderRanking();
            }
        } catch (error) {
            console.error("載入排行榜失敗:", error);
            showToast("載入排行榜失敗", true);
        }
    }
    
    // 渲染排行榜
    function renderRanking() {
        if (!rankTbody) return;
        const start = (currentPage - 1) * itemsPerPage;
        const pagePlayers = filteredPlayers.slice(start, start + itemsPerPage);
        
        if (pagePlayers.length === 0) {
            rankTbody.innerHTML = "<tr><td colspan='5'>暫無資料</td></tr>";
            return;
        }
        
        let html = "";
        pagePlayers.forEach(p => {
            const rank = allPlayers.findIndex(p2 => p2.id === p.id) + 1;
            html += `<tr data-id="${p.id}">
                <td>${rank}</td>
                <td><span class="player-avatar">${p.avatar || "🏆"}</span> ${p.name} <span style="font-size:0.7rem; color:#8aa9c2;">(${p.id})</span></td>
                <td class="score-value">${p.score}</td>
                <td><span class="player-streak">${p.streak}連勝</span></td>
                <td>${p.wins}勝 ${p.losses}敗 ${p.ties}平</td>
            </tr>`;
        });
        rankTbody.innerHTML = html;
        
        document.querySelectorAll("#rankTbody tr").forEach(row => {
            row.addEventListener("click", () => {
                const pid = row.getAttribute("data-id");
                const player = allPlayers.find(p => p.id === pid);
                if (player) showPlayerPopup(player);
            });
        });
        
        const total = filteredPlayers.length;
        const startNum = start + 1;
        const endNum = Math.min(start + itemsPerPage, total);
        paginationInfo.innerText = `${startNum}-${endNum} / ${total}`;
        totalPlayersSpan.innerText = allPlayers.length;
        const maxStreak = Math.max(...allPlayers.map(p => p.streak || 0), 0);
        highestStreakSpan.innerText = maxStreak;
        if (allPlayers.length) weeklyChampionSpan.innerText = allPlayers[0].name;
        renderPagination();
    }
    
    function renderPagination() {
        const totalPages = Math.ceil(filteredPlayers.length / itemsPerPage);
        if (totalPages <= 1) { paginationControls.innerHTML = ""; return; }
        let html = `<button class="page-btn" data-page="${currentPage-1}" ${currentPage===1 ? 'disabled' : ''}>〈 上一頁</button>`;
        for (let i = Math.max(1, currentPage-2); i <= Math.min(totalPages, currentPage+2); i++) {
            html += `<button class="page-btn ${i===currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
        }
        html += `<button class="page-btn" data-page="${currentPage+1}" ${currentPage===totalPages ? 'disabled' : ''}>下一頁 〉</button>`;
        paginationControls.innerHTML = html;
        
        document.querySelectorAll(".page-btn").forEach(btn => {
            if (!btn.disabled && btn.dataset.page) {
                btn.addEventListener("click", () => {
                    currentPage = parseInt(btn.dataset.page);
                    renderRanking();
                });
            }
        });
    }
    
    function searchPlayers(term) {
        const searchTerm = term.trim().toLowerCase();
        if (!searchTerm) {
            filteredPlayers = [...allPlayers];
        } else {
            filteredPlayers = allPlayers.filter(p => p.name.toLowerCase().includes(searchTerm));
        }
        currentPage = 1;
        renderRanking();
    }
    
    function showPlayerPopup(player) {
        const rank = allPlayers.findIndex(p => p.id === player.id) + 1;
        const total = player.wins + player.losses + player.ties;
        const winRate = total ? Math.round(player.wins / total * 100) : 0;
        popupName.innerText = player.name;
        popupBody.innerHTML = `
            <div class="popup-avatar"><div class="avatar-large">${player.avatar || "🏆"}</div></div>
            <div class="info-row"><span>玩家ID</span><span>${player.id}</span></div>
            <div class="info-row"><span>活躍區域</span><span>${player.district || "未設定"}</span></div>
            <div class="info-row"><span>全港排名</span><span>第 ${rank}</span></div>
            <div class="info-row"><span>積分</span><span>${player.score}</span></div>
            <div class="info-row"><span>連勝</span><span>${player.streak}</span></div>
            <div class="stats-grid"><div class="stat-card">${player.wins}<br>勝</div><div class="stat-card">${player.losses}<br>敗</div><div class="stat-card">${player.ties}<br>平</div><div class="stat-card">${winRate}%<br>勝率</div></div>
        `;
        popupOverlay.classList.add("active");
    }
    
    function closePopup() { popupOverlay.classList.remove("active"); }
    function openAuthModal() { authModal.classList.add("active"); }
    function closeAuthModal() { authModal.classList.remove("active"); }
    function openProfileModal() { 
        if (!currentUser) { showToast("請先登入", true); return; }
        profileAvatarPreview.innerHTML = `<div style="font-size:2rem;">${currentUser.avatar || "🏆"}</div>`;
        profileDistrict.value = currentUser.district || "觀塘區";
        profileModal.classList.add("active");
    }
    function closeProfileModal() { profileModal.classList.remove("active"); }
    
    function switchAuthTab(tab) {
        if (tab === 'login') {
            loginForm.style.display = "block";
            registerForm.style.display = "none";
            document.getElementById("loginTabBtn").classList.add("active");
            document.getElementById("registerTabBtn").classList.remove("active");
        } else {
            loginForm.style.display = "none";
            registerForm.style.display = "block";
            document.getElementById("loginTabBtn").classList.remove("active");
            document.getElementById("registerTabBtn").classList.add("active");
        }
    }
    
    function setupEmojiPicker(gridId, onSelect, previewElement) {
        const grid = document.getElementById(gridId);
        if (!grid) return;
        grid.innerHTML = EMOJIS.map(e => `<div class="emoji-option" data-emoji="${e}">${e}</div>`).join("");
        grid.querySelectorAll(".emoji-option").forEach(el => {
            el.addEventListener("click", () => {
                const emoji = el.getAttribute("data-emoji");
                onSelect(emoji);
                if (previewElement) {
                    previewElement.innerHTML = `<div style="font-size:1.8rem;">${emoji}</div>`;
                }
            });
        });
    }
    
    function setupImageUpload(fileInputId, previewId, onLoad) {
        const input = document.getElementById(fileInputId);
        const preview = document.getElementById(previewId);
        if (!input) return;
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const base64 = ev.target.result;
                    onLoad(base64);
                    preview.innerHTML = `<img src="${base64}" style="width:100%; height:100%; object-fit:cover; border-radius:50%;">`;
                };
                reader.readAsDataURL(file);
            }
        };
    }
    
    function renderRooms() {
        const mockRooms = [
            { id:"rm1", host:"星穹天馬", location:"維園草地", time:"今晚 8:00", players:2, max:4 },
            { id:"rm2", host:"銀翼龍騎", location:"麥花臣球場", time:"明日 15:00", players:1, max:4 }
        ];
        if (!roomList) return;
        if (mockRooms.length === 0) { roomList.innerHTML = "<div style='text-align:center;padding:20px'>暫無約戰</div>"; return; }
        let html = "";
        mockRooms.forEach(r => {
            html += `<div class="room-card"><div class="room-title"><span><i class="fas fa-gamepad"></i> ${r.host} 的房間</span><button class="join-btn" data-id="${r.id}">加入</button></div>
            <div class="room-detail"><i class="fas fa-map-marker-alt"></i> ${r.location} &nbsp; <i class="far fa-clock"></i> ${r.time}</div>
            <div class="room-detail"><i class="fas fa-user-friends"></i> ${r.players}/${r.max} 人</div></div>`;
        });
        roomList.innerHTML = html;
        document.querySelectorAll(".join-btn").forEach(btn => {
            btn.addEventListener("click", (e) => { 
                e.stopPropagation(); 
                if (!currentUser) showToast("請先登入", true); 
                else alert("預約功能開發中"); 
            });
        });
    }
    
    function closeMenu() {
        document.getElementById("sideMenu").classList.remove("open");
        document.getElementById("overlay").classList.remove("active");
    }
    
    document.addEventListener('DOMContentLoaded', () => {
        rankTbody = document.getElementById("rankTbody");
        searchInput = document.getElementById("searchInput");
        searchBtn = document.getElementById("searchBtn");
        clearBtn = document.getElementById("clearSearchBtn");
        paginationControls = document.getElementById("paginationControls");
        paginationInfo = document.getElementById("paginationInfo");
        totalPlayersSpan = document.getElementById("totalPlayersCount");
        highestStreakSpan = document.getElementById("highestStreak");
        weeklyChampionSpan = document.getElementById("weeklyChampion");
        sideUserAvatar = document.getElementById("sideUserAvatar");
        sideUserName = document.getElementById("sideUserName");
        loginMenuItem = document.getElementById("loginMenuItem");
        authModal = document.getElementById("authModal");
        loginForm = document.getElementById("loginForm");
        registerForm = document.getElementById("registerForm");
        loginEmail = document.getElementById("loginEmail");
        loginPassword = document.getElementById("loginPassword");
        doLoginBtn = document.getElementById("doLoginBtn");
        regEmail = document.getElementById("regEmail");
        regName = document.getElementById("regName");
        regDistrict = document.getElementById("regDistrict");
        regPassword = document.getElementById("regPassword");
        regConfirmPassword = document.getElementById("regConfirmPassword");
        doRegisterBtn = document.getElementById("doRegisterBtn");
        profileModal = document.getElementById("profileModal");
        profileAvatarPreview = document.getElementById("profileAvatarPreview");
        profileDistrict = document.getElementById("profileDistrict");
        saveProfileBtn = document.getElementById("saveProfileBtn");
        popupOverlay = document.getElementById("popupOverlay");
        popupName = document.getElementById("popupName");
        popupBody = document.getElementById("popupBody");
        popupCloseBtn = document.getElementById("popupCloseBtn");
        createRoomBtn = document.getElementById("createRoomBtn");
        roomList = document.getElementById("roomList");
        
        searchBtn.addEventListener("click", () => searchPlayers(searchInput.value));
        clearBtn.addEventListener("click", () => { searchInput.value = ""; searchPlayers(""); });
        loginMenuItem.addEventListener("click", (e) => { e.preventDefault(); if (currentUser) logout(); else openAuthModal(); closeMenu(); });
        document.getElementById("myProfileMenuItem")?.addEventListener("click", (e) => { e.preventDefault(); openProfileModal(); closeMenu(); });
        document.getElementById("battleHistoryMenuItem")?.addEventListener("click", () => { alert("對戰紀錄開發中"); closeMenu(); });
        document.getElementById("scanBattleMenuItem")?.addEventListener("click", () => { if (!currentUser) showToast("請先登入", true); else alert("掃碼對戰開發中"); closeMenu(); });
        document.getElementById("rulesMenuItem")?.addEventListener("click", () => { alert("排行榜說明：\n- 初始1000分\n- 勝者奪敗者10%積分..."); closeMenu(); });
        createRoomBtn.addEventListener("click", () => { if (!currentUser) showToast("請先登入", true); else alert("開設房間功能開發中"); });
        
        document.getElementById("closeAuthBtn").addEventListener("click", closeAuthModal);
        authModal.addEventListener("click", (e) => { if (e.target === authModal) closeAuthModal(); });
        document.getElementById("loginTabBtn").addEventListener("click", () => switchAuthTab('login'));
        document.getElementById("registerTabBtn").addEventListener("click", () => switchAuthTab('register'));
        doLoginBtn.addEventListener("click", doLogin);
        doRegisterBtn.addEventListener("click", doRegister);
        
        document.getElementById("closeProfileBtn").addEventListener("click", closeProfileModal);
        profileModal.addEventListener("click", (e) => { if (e.target === profileModal) closeProfileModal(); });
        saveProfileBtn.addEventListener("click", saveProfile);
        popupCloseBtn.addEventListener("click", closePopup);
        popupOverlay.addEventListener("click", (e) => { if (e.target === popupOverlay) closePopup(); });
        
        document.getElementById("menuToggleBtn").addEventListener("click", () => {
            document.getElementById("sideMenu").classList.add("open");
            document.getElementById("overlay").classList.add("active");
        });
        document.getElementById("overlay").addEventListener("click", closeMenu);
        
        setupEmojiPicker("regEmojiGrid", (emoji) => { selectedRegAvatar = emoji; }, document.getElementById("regAvatarPreview"));
        setupEmojiPicker("profileEmojiGrid", (emoji) => { selectedProfileAvatar = emoji; }, profileAvatarPreview);
        setupImageUpload("regAvatarUpload", "regAvatarPreview", (base64) => { selectedRegAvatar = base64; });
        setupImageUpload("profileAvatarUpload", "profileAvatarPreview", (base64) => { selectedProfileAvatar = base64; });
        
        renderRooms();
        checkLoginStatus();
        loadRankings();
    });
<\/script>
