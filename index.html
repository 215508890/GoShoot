<div class="container">
    <div class="navbar">
        <div class="logo-area">

        </div>
        <button class="menu-btn" id="menuToggleBtn"><span></span><span></span><span></span></button>
    </div>

    <div class="side-menu" id="sideMenu">
        <div class="menu-header">

        <ul class="menu-items">
            <li><a id="loginMenuItem"><i class="fas fa-sign-in-alt"></i> 登入 / 註冊</a></li>
            <li><a id="myProfileMenuItem"><i class="fas fa-id-card"></i> 我的檔案</a></li>
            <li><a id="battleHistoryMenuItem"><i class="fas fa-history"></i> 對戰紀錄</a></li>

            <li><a id="rulesMenuItem"><i class="fas fa-info-circle"></i> 排行榜說明</a></li>
        </ul>
    </div>
    <div class="overlay" id="overlay"></div>

    <div class="search-bar">
        <input type="text" class="search-input" id="searchInput" placeholder="玩家名稱 或 數字ID">

        <button class="clear-btn" id="clearSearchBtn"><i class="fas fa-times"></i> 清除</button>
    </div>

    <div class="dashboard">
        <div class="rank-panel">

            <div class="room-list" id="roomList">載入中...</div>

            <div class="info-block">
                <h3><i class="fas fa-dice-d6"></i> 積分規則</h3>
                <ul class="rule-list">
                    <li><i class="fas fa-star"></i> 初始1000分</li>
                    <li><i class="fas fa-bolt"></i> 勝者奪敗者10% (上限150)</li>
                    <li><i class="fas fa-shield-alt"></i> 新手保護 ≤500分扣5%</li>
                    <li><i class="fas fa-clock"></i> 同一對手24hr一次</li>

    // 48 個 Emoji 選項
    const EMOJIS = [
        "😀","😎","🥳","😍","🔥","⭐","🦅","🐉","🦁","🐺","🦄","🦈",
        "⚔️","🛡️","🌟","🌊","⚡","❄️","🌙","🎯","🏆","🎮","🔮","💎",
        "🐉","🐲","🦸","🦹","🧙","🧝","🐱","🐶","🐼","🐨","🦊","🐸",
        "🐧","🐦","🐝","🌸","🍀","🌿","🔥","💧","🌪️","🌈","☀️","🌙"
    ];

    let currentUser = null;
    let allPlayers = [];
    let filteredPlayers = [];
    let currentPage = 1;
    const itemsPerPage = 15;
    let currentSearchTerm = "";
    let selectedRegAvatar = "🏆";
    let selectedProfileAvatar = null;

    let rankTbody, searchInput, searchBtn, clearBtn, paginationControls, paginationInfo;
    let totalPlayersSpan, highestStreakSpan, weeklyChampionSpan;
    let sideUserAvatar, sideUserName, loginMenuItem;
    let authModal, loginForm, registerForm, loginIdInput, loginPasswordInput, doLoginBtn;
    let regEmail, regNameInput, regDistrictSelect, regPasswordInput, regConfirmPassword, doRegisterBtn;
    let profileModal, profileAvatarPreview, profileDistrictSelect, saveProfileBtn;
    let popupOverlay, popupName, popupBody, popupCloseBtn;
    let createRoomBtn, roomList;

    function showToast(msg, isError = false) {
        const toast = document.getElementById("toastMessage");
        if (!toast) return;
        toast.textContent = msg;
        toast.style.background = isError ? "#c0392b" : "#1e2a3a";
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 3000);
    }

    function setButtonLoading(btn, isLoading) {
        if (!btn) return;
        if (isLoading) {
            btn.dataset.originalText = btn.innerHTML;
            btn.innerHTML = '<span class="loading-spinner"></span> 處理中';
            btn.disabled = true;
        } else {
            btn.innerHTML = btn.dataset.originalText || btn.innerHTML;
            btn.disabled = false;
        }
    }

    async function getOrCreatePlayer(firebaseUser) {
        const playerRef = doc(db, "players", firebaseUser.uid);
        const docSnap = await getDoc(playerRef);
        if (docSnap.exists()) {
            return { id: firebaseUser.uid, ...docSnap.data() };
        } else {
            const numericId = Math.floor(10000 + Math.random() * 90000);
            const newPlayer = {
                player_number: numericId,
                name: firebaseUser.email ? firebaseUser.email.split('@')[0] : "新戰士",
                avatar: "🏆",
                district: "觀塘區",
                score: 1000,
                streak: 0,
                wins: 0,
                losses: 0,
                ties: 0,
                email: firebaseUser.email,
                emailVerified: firebaseUser.emailVerified
            };
            await setDoc(playerRef, newPlayer);
            return { id: firebaseUser.uid, ...newPlayer };
        }
    }

    async function loadRankings() {
        try {
            const q = query(collection(db, "players"), orderBy("score", "desc"), limit(200));
            const querySnapshot = await getDocs(q);
            allPlayers = [];
            querySnapshot.forEach(doc => {
                allPlayers.push({ id: doc.id, ...doc.data() });
            });
            filteredPlayers = [...allPlayers];
            renderRanking();
        } catch (err) {
            console.error("載入排行榜失敗", err);
            showToast("載入排行榜失敗，請檢查網路", true);
        }
    }

    async function updatePlayerProfile(avatar, district) {
        if (!currentUser) return;
        const playerRef = doc(db, "players", currentUser.id);
        await updateDoc(playerRef, { avatar, district });
        currentUser.avatar = avatar;
        currentUser.district = district;
        updateSidebarUI();
        loadRankings();
        showToast("檔案已更新");
    }

    async function logout() {
        if (confirm("確定要登出嗎？")) {
            await signOut(auth);
            showToast("已登出");
        }
    }

    async function doLogin() {
        const numericId = loginIdInput.value.trim();
        const password = loginPasswordInput.value;
        if (!numericId || !password) { showToast("請輸入數字ID和密碼", true); return; }
        const email = numericId + "@gyro.local";
        setButtonLoading(doLoginBtn, true);
        try {
            await signInWithEmailAndPassword(auth, email, password);
            closeAuthModal();
            showToast("登入成功");
        } catch (error) {
            let msg = "登入失敗";
            if (error.code === 'auth/user-not-found') msg = "找不到此玩家ID";
            else if (error.code === 'auth/wrong-password') msg = "密碼錯誤";
            else if (error.code === 'auth/invalid-email') msg = "ID格式錯誤";
            else if (error.code === 'auth/email-not-verified') msg = "請先驗證電郵";
            showToast(msg, true);
        } finally {
            setButtonLoading(doLoginBtn, false);
        }
    }

    async function doRegister() {
        const email = regEmail.value.trim();
        const name = regNameInput.value.trim();
        const district = regDistrictSelect.value;
        const password = regPasswordInput.value;
        const confirmPassword = regConfirmPassword.value;
        
        if (!email) { showToast("請填寫電子郵件", true); return; }
        if (!name) { showToast("請填寫戰士名稱", true); return; }
        if (!password) { showToast("請填寫密碼", true); return; }
        if (password.length < 6) { showToast("密碼至少 6 位", true); return; }
        if (password !== confirmPassword) { showToast("兩次輸入的密碼不一致", true); return; }
        
        setButtonLoading(doRegisterBtn, true);
        try {
            const userCred = await createUserWithEmailAndPassword(auth, email, password);
            const uid = userCred.user.uid;
            
            // 發送驗證電郵
            await sendEmailVerification(userCred.user);
            
            const numericId = Math.floor(10000 + Math.random() * 90000);
            const newPlayer = {
                player_number: numericId,
                name: name,
                avatar: selectedRegAvatar,
                district: district,
                score: 1000,
                streak: 0,
                wins: 0,
                losses: 0,
                ties: 0,
                email: email,
                emailVerified: false
            };
            await setDoc(doc(db, "players", uid), newPlayer);
            showToast(`註冊成功！驗證電郵已發送至 ${email}，請點擊驗證後登入`);
            switchAuthTab('login');
            regEmail.value = "";
            regNameInput.value = "";
            regPasswordInput.value = "";
            regConfirmPassword.value = "";
        } catch (error) {
            let msg = "註冊失敗";
            if (error.code === 'auth/email-already-in-use') msg = "此電子郵件已被註冊";
            else if (error.code === 'auth/invalid-email') msg = "電子郵件格式無效";
            showToast(msg, true);
        } finally {
            setButtonLoading(doRegisterBtn, false);
        }
    }

    function updateSidebarUI() {
        if (currentUser) {
            const av = currentUser.avatar;
            if (av && (av.startsWith("http") || av.startsWith("data:image"))) {
                sideUserAvatar.innerHTML = `<img src="${av}" alt="avatar">`;
            } else {
                sideUserAvatar.innerHTML = av || "🏆";
            }
            const verifiedBadge = currentUser.emailVerified ? '<span class="verify-badge">✓ 已驗證</span>' : '<span class="verify-badge" style="background:#e74c3c;">⚠ 未驗證</span>';
            sideUserName.innerHTML = currentUser.name + verifiedBadge;
            loginMenuItem.innerHTML = '<i class="fas fa-sign-out-alt"></i> 登出';
        } else {
            sideUserAvatar.innerHTML = "🏆";
            sideUserName.innerHTML = "訪客";
            loginMenuItem.innerHTML = '<i class="fas fa-sign-in-alt"></i> 登入 / 註冊';
        }
    }

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            if (!user.emailVerified) {
                showToast("請先到電子郵件信箱驗證帳號", true);
                await signOut(auth);
                currentUser = null;
                updateSidebarUI();
                return;
            }
            currentUser = await getOrCreatePlayer(user);
            currentUser.emailVerified = user.emailVerified;
            updateSidebarUI();
            if (allPlayers.length === 0) await loadRankings();
            else loadRankings();
            closeAuthModal();
            closeProfileModal();
        } else {
            currentUser = null;
            updateSidebarUI();
        }
    });

    function renderRanking() {
        if (!rankTbody) return;
        const start = (currentPage - 1) * itemsPerPage;
        const pagePlayers = filteredPlayers.slice(start, start + itemsPerPage);
        if (pagePlayers.length === 0) { rankTbody.innerHTML = "<tr><td colspan='5'>暫無資料</td></tr>"; return; }
        let html = "";
        pagePlayers.forEach(p => {
            const rank = allPlayers.findIndex(p2 => p2.id === p.id) + 1;
            let avatarHtml = p.avatar;
            if (p.avatar && (p.avatar.startsWith("http") || p.avatar.startsWith("data:image"))) {
                avatarHtml = `<img src="${p.avatar}" style="width:100%; height:100%; object-fit:cover; border-radius:50%;">`;
            }
            html += `<tr data-id="${p.id}">
                <td class="rank-number">${rank}</td>
                <td class="player-name-cell"><span class="player-avatar">${avatarHtml}</span> ${p.name} <span class="player-id">(${p.player_number})</span></td>
                <td class="score-value">${p.score}</td>
                <td><span class="player-streak">${p.streak}連勝</span></td>
                <td class="win-loss">${p.wins}勝 ${p.losses}敗 ${p.ties}平</td>
            </td>`;
        });
        rankTbody.innerHTML = html;
        document.querySelectorAll("#rankTbody tr").forEach(row => {
            row.addEventListener("click", () => {
                const pid = row.getAttribute("data-id");
                const player = allPlayers.find(p => p.id === pid);
                if (player) showPlayerPopup(player);
            });
        });
        paginationInfo.innerText = `${start+1}-${Math.min(start+itemsPerPage, filteredPlayers.length)} / ${filteredPlayers.length}`;
        totalPlayersSpan.innerText = allPlayers.length;
        const maxStreak = Math.max(...allPlayers.map(p => p.streak || 0), 0);
        highestStreakSpan.innerText = maxStreak;
        if (allPlayers.length) weeklyChampionSpan.innerText = allPlayers[0].name;
        renderPagination();
    }

    function renderPagination() {
        const totalPages = Math.ceil(filteredPlayers.length / itemsPerPage);
        if (totalPages <= 1) { paginationControls.innerHTML = ""; return; }
        let html = `<button class="page-btn" data-page="${currentPage-1}" ${currentPage===1 ? 'disabled' : ''}>〈 上一頁</button>`;
        for (let i = Math.max(1, currentPage-2); i <= Math.min(totalPages, currentPage+2); i++)
            html += `<button class="page-btn ${i===currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
        html += `<button class="page-btn" data-page="${currentPage+1}" ${currentPage===totalPages ? 'disabled' : ''}>下一頁 〉</button>`;
        paginationControls.innerHTML = html;
        document.querySelectorAll(".page-btn").forEach(btn => {
            if (!btn.disabled && btn.dataset.page)
                btn.addEventListener("click", () => { currentPage = parseInt(btn.dataset.page); renderRanking(); });
        });
    }

    function searchPlayers(term) {
        currentSearchTerm = term.trim().toLowerCase();
        if (!currentSearchTerm) filteredPlayers = [...allPlayers];
        else filteredPlayers = allPlayers.filter(p => p.name.toLowerCase().includes(currentSearchTerm) || p.player_number.toString().includes(currentSearchTerm));
        currentPage = 1;
        renderRanking();
        const infoDiv = document.getElementById("searchResultInfo");
        if (currentSearchTerm) infoDiv.innerHTML = `<i class="fas fa-search"></i> 搜尋 "${currentSearchTerm}" 共 ${filteredPlayers.length} 位`;
        else infoDiv.innerHTML = "";
    }

    function showPlayerPopup(player) {
        const rank = allPlayers.findIndex(p => p.id === player.id) + 1;
        const total = player.wins + player.losses + player.ties;
        const winRate = total ? Math.round(player.wins / total * 100) : 0;
        let avatarHtml = player.avatar;
        if (player.avatar && (player.avatar.startsWith("http") || player.avatar.startsWith("data:image"))) {
            avatarHtml = `<img src="${player.avatar}" style="width:100%; height:100%; object-fit:cover;">`;
        }
        popupName.innerText = player.name;
        popupBody.innerHTML = `
            <div class="popup-avatar"><div class="avatar-large">${avatarHtml}</div></div>
            <div class="info-row"><span>玩家ID</span><span>${player.player_number}</span></div>
            <div class="info-row"><span>活躍區域</span><span>${player.district || "未設定"}</span></div>
            <div class="info-row"><span>全港排名</span><span>第 ${rank}</span></div>
            <div class="info-row"><span>積分</span><span>${player.score}</span></div>
            <div class="info-row"><span>連勝</span><span>${player.streak}</span></div>
            <div class="stats-grid"><div class="stat-card">${player.wins}<br>勝</div><div class="stat-card">${player.losses}<br>敗</div><div class="stat-card">${player.ties}<br>平</div><div class="stat-card">${winRate}%<br>勝率</div></div>
        `;
        popupOverlay.classList.add("active");
    }

    function closePopup() { popupOverlay.classList.remove("active"); }

    function openAuthModal() { authModal.classList.add("active"); }
    function closeAuthModal() { authModal.classList.remove("active"); }
    function switchAuthTab(tab) {
        if (tab === 'login') {
            loginForm.style.display = "block";
            registerForm.style.display = "none";
            document.getElementById("loginTabBtn").classList.add("active");
            document.getElementById("registerTabBtn").classList.remove("active");
        } else {
            loginForm.style.display = "none";
            registerForm.style.display = "block";
            document.getElementById("loginTabBtn").classList.remove("active");
            document.getElementById("registerTabBtn").classList.add("active");
        }
    }

    function openProfileModal() {
        if (!currentUser) { showToast("請先登入", true); return; }
        const av = currentUser.avatar;
        if (av && (av.startsWith("http") || av.startsWith("data:image"))) {
            profileAvatarPreview.innerHTML = `<img src="${av}" style="width:100%; height:100%; object-fit:cover;">`;
        } else {
            profileAvatarPreview.innerHTML = `<div style="font-size:2rem;">${av || "🏆"}</div>`;
        }
        profileDistrictSelect.value = currentUser.district || "觀塘區";
        profileModal.classList.add("active");
    }
    function closeProfileModal() { profileModal.classList.remove("active"); }
    async function saveProfile() {
        const newAvatar = selectedProfileAvatar || currentUser.avatar;
        const newDistrict = profileDistrictSelect.value;
        await updatePlayerProfile(newAvatar, newDistrict);
        closeProfileModal();
    }

    function setupEmojiPicker(gridId, onSelect, previewElement = null) {
        const grid = document.getElementById(gridId);
        if (!grid) return;
        grid.innerHTML = EMOJIS.map(e => `<div class="emoji-option" data-emoji="${e}">${e}</div>`).join("");
        grid.querySelectorAll(".emoji-option").forEach(el => {
            el.addEventListener("click", () => {
                const emoji = el.getAttribute("data-emoji");
                onSelect(emoji);
                if (previewElement) {
                    previewElement.innerHTML = `<div style="font-size:1.8rem;">${emoji}</div>`;
                }
            });
        });
    }

    function setupImageUpload(fileInputId, previewId, onLoad) {
        const input = document.getElementById(fileInputId);
        const preview = document.getElementById(previewId);
        if (!input) return;
        input.onchange = (e) => {
            const file = e.target.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const base64 = ev.target.result;
                    onLoad(base64);
                    if (preview) {
                        preview.innerHTML = `<img src="${base64}" style="width:100%; height:100%; object-fit:cover; border-radius:50%;">`;
                    }
                };
                reader.readAsDataURL(file);
            } else {
                showToast("請選擇圖片檔案", true);
            }
        };
    }

    function renderRooms() {
        const mockRooms = [
            { id:"rm1", host:"星穹天馬", location:"維園草地", time:"今晚 8:00", players:2, max:4 },
            { id:"rm2", host:"銀翼龍騎", location:"麥花臣球場", time:"明日 15:00", players:1, max:4 }
        ];
        if (!roomList) return;
        if (mockRooms.length === 0) { roomList.innerHTML = "<div style='text-align:center;padding:20px'>暫無約戰</div>"; return; }
        let html = "";
        mockRooms.forEach(r => {
            html += `<div class="room-card"><div class="room-title"><span><i class="fas fa-gamepad"></i> ${r.host} 的房間</span><button class="join-btn" data-id="${r.id}">加入</button></div>
            <div class="room-detail"><i class="fas fa-map-marker-alt"></i> ${r.location} &nbsp; <i class="far fa-clock"></i> ${r.time}</div>
            <div class="room-detail"><i class="fas fa-user-friends"></i> ${r.players}/${r.max} 人</div></div>`;
        });
        roomList.innerHTML = html;
        document.querySelectorAll(".join-btn").forEach(btn => {
            btn.addEventListener("click", (e) => { e.stopPropagation(); if (!currentUser) showToast("請先登入", true); else alert("預約功能開發中"); });
        });
    }

    function closeMenu() {
        const sideMenu = document.getElementById("sideMenu");
        const overlay = document.getElementById("overlay");
        if (sideMenu) sideMenu.classList.remove("open");
        if (overlay) overlay.classList.remove("active");
    }

    document.addEventListener('DOMContentLoaded', () => {
        rankTbody = document.getElementById("rankTbody");
        searchInput = document.getElementById("searchInput");
        searchBtn = document.getElementById("searchBtn");
        clearBtn = document.getElementById("clearSearchBtn");
        paginationControls = document.getElementById("paginationControls");
        paginationInfo = document.getElementById("paginationInfo");
        totalPlayersSpan = document.getElementById("totalPlayersCount");
        highestStreakSpan = document.getElementById("highestStreak");
        weeklyChampionSpan = document.getElementById("weeklyChampion");
        sideUserAvatar = document.getElementById("sideUserAvatar");
        sideUserName = document.getElementById("sideUserName");
        loginMenuItem = document.getElementById("loginMenuItem");
        authModal = document.getElementById("authModal");
        loginForm = document.getElementById("loginForm");
        registerForm = document.getElementById("registerForm");
        loginIdInput = document.getElementById("loginId");
        loginPasswordInput = document.getElementById("loginPassword");
        doLoginBtn = document.getElementById("doLoginBtn");
        regEmail = document.getElementById("regEmail");
        regNameInput = document.getElementById("regName");
        regDistrictSelect = document.getElementById("regDistrict");
        regPasswordInput = document.getElementById("regPassword");
        regConfirmPassword = document.getElementById("regConfirmPassword");
        doRegisterBtn = document.getElementById("doRegisterBtn");
        profileModal = document.getElementById("profileModal");
        profileAvatarPreview = document.getElementById("profileAvatarPreview");
        profileDistrictSelect = document.getElementById("profileDistrict");
        saveProfileBtn = document.getElementById("saveProfileBtn");
        popupOverlay = document.getElementById("popupOverlay");
        popupName = document.getElementById("popupName");
        popupBody = document.getElementById("popupBody");
        popupCloseBtn = document.getElementById("popupCloseBtn");
        createRoomBtn = document.getElementById("createRoomBtn");
        roomList = document.getElementById("roomList");

        searchBtn.addEventListener("click", () => searchPlayers(searchInput.value));
        clearBtn.addEventListener("click", () => { searchInput.value = ""; searchPlayers(""); });
        searchInput.addEventListener("keypress", (e) => { if (e.key === "Enter") searchPlayers(searchInput.value); });
        loginMenuItem.addEventListener("click", (e) => { e.preventDefault(); if (currentUser) logout(); else openAuthModal(); closeMenu(); });
        document.getElementById("myProfileMenuItem")?.addEventListener("click", (e) => { e.preventDefault(); openProfileModal(); closeMenu(); });
        document.getElementById("battleHistoryMenuItem")?.addEventListener("click", () => { alert("對戰紀錄開發中"); closeMenu(); });
        document.getElementById("scanBattleMenuItem")?.addEventListener("click", () => { if (!currentUser) showToast("請先登入", true); else alert("掃碼對戰開發中"); closeMenu(); });
        document.getElementById("rulesMenuItem")?.addEventListener("click", () => { alert("排行榜說明：\n- 初始1000分\n- 勝者奪敗者10%積分..."); closeMenu(); });
        createRoomBtn.addEventListener("click", () => { if (!currentUser) showToast("請先登入", true); else alert("開設房間功能開發中"); });
        renderRooms();

        document.getElementById("closeAuthBtn").addEventListener("click", closeAuthModal);
        authModal.addEventListener("click", (e) => { if (e.target === authModal) closeAuthModal(); });
        document.getElementById("loginTabBtn").addEventListener("click", () => switchAuthTab('login'));
        document.getElementById("registerTabBtn").addEventListener("click", () => switchAuthTab('register'));
        doLoginBtn.addEventListener("click", doLogin);
        doRegisterBtn.addEventListener("click", doRegister);

        document.getElementById("closeProfileBtn").addEventListener("click", closeProfileModal);
        profileModal.addEventListener("click", (e) => { if (e.target === profileModal) closeProfileModal(); });
        saveProfileBtn.addEventListener("click", saveProfile);
        popupCloseBtn.addEventListener("click", closePopup);
        popupOverlay.addEventListener("click", (e) => { if (e.target === popupOverlay) closePopup(); });

        const menuBtn = document.getElementById("menuToggleBtn");
        const sideMenu = document.getElementById("sideMenu");
        const overlay = document.getElementById("overlay");
        menuBtn.addEventListener("click", () => { sideMenu.classList.add("open"); overlay.classList.add("active"); });
        overlay.addEventListener("click", () => { sideMenu.classList.remove("open"); overlay.classList.remove("active"); });

        setupEmojiPicker("regEmojiGrid", (emoji) => { selectedRegAvatar = emoji; }, document.getElementById("regAvatarPreview"));
        setupEmojiPicker("profileEmojiGrid", (emoji) => { selectedProfileAvatar = emoji; }, profileAvatarPreview);
        setupImageUpload("regAvatarUpload", "regAvatarPreview", (base64) => { selectedRegAvatar = base64; });
        setupImageUpload("profileAvatarUpload", "profileAvatarPreview", (base64) => { selectedProfileAvatar = base64; });
    });

    loadRankings();
</script>
</body>
</html>
