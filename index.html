<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>爆旋陀螺 · 天馬戰榜 | 香港排名</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #f0f4fc 0%, #e6edf6 100%);
            font-family: system-ui, 'Segoe UI', 'Roboto', -apple-system, sans-serif;
            line-height: 1.4;
            color: #1a2c3e;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" opacity="0.06"><path fill="none" stroke="%232c6e9e" stroke-width="1.5" d="M100 20 L120 40 L100 60 L80 40 Z M100 80 L130 110 L100 140 L70 110 Z M100 150 L115 170 L100 190 L85 170 Z" /><circle cx="100" cy="100" r="18" stroke="%232c6e9e" fill="none" stroke-width="1"/></svg>');
            background-repeat: repeat;
            background-size: 48px;
            pointer-events: none;
            z-index: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px 12px;
            position: relative;
            z-index: 2;
        }
        /* 頂欄 */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            padding-bottom: 12px;
            border-bottom: 2px solid rgba(44, 110, 158, 0.3);
            margin-bottom: 20px;
        }
        .logo-area h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1e4a76, #2c7ab8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo-area p {
            font-size: 0.7rem;
            color: #4a6f8f;
            margin-top: 2px;
        }
        .menu-btn {
            background: rgba(255,255,255,0.8);
            border: 1px solid #c0d4e8;
            padding: 8px 12px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            cursor: pointer;
        }
        .menu-btn span {
            width: 22px;
            height: 2px;
            background: #2c6280;
            display: block;
        }
        /* 側邊選單 */
        .side-menu {
            position: fixed;
            top: 0;
            right: -280px;
            width: 280px;
            height: 100%;
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(10px);
            box-shadow: -4px 0 20px rgba(0,0,0,0.1);
            transition: right 0.25s ease;
            z-index: 1000;
            border-left: 1px solid #cde3f5;
        }
        .side-menu.open { right: 0; }
        .menu-header {
            padding: 20px 16px;
            border-bottom: 1px solid #e0ecf8;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-icon-large {
            width: 48px;
            height: 48px;
            background: #e0edfc;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            overflow: hidden;
        }
        .user-icon-large img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .menu-items {
            list-style: none;
            padding: 12px 0;
        }
        .menu-items li {
            padding: 12px 20px;
            border-bottom: 1px solid #ecf3fa;
        }
        .menu-items li a {
            text-decoration: none;
            color: #2c5a7a;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(2px);
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
            z-index: 999;
        }
        .overlay.active {
            opacity: 1;
            visibility: visible;
        }
        /* 搜尋列 */
        .search-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-input {
            flex: 1;
            min-width: 0;
            padding: 12px 16px;
            border: 1px solid #cbdde9;
            border-radius: 44px;
            font-size: 0.9rem;
            background: white;
        }
        .search-btn, .clear-btn {
            padding: 12px 20px;
            border-radius: 44px;
            font-weight: 600;
            font-size: 0.85rem;
            border: none;
            cursor: pointer;
            white-space: nowrap;
        }
        .search-btn {
            background: #2c6e9e;
            color: white;
        }
        .clear-btn {
            background: #eef2f8;
            color: #2c5a7a;
            border: 1px solid #cbdde9;
        }
        .search-result-info {
            font-size: 0.7rem;
            color: #5a7e9c;
            margin: -8px 0 12px 8px;
        }
        /* 主內容直排 */
        .dashboard {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        /* 排名榜 */
        .rank-panel {
            background: #ffffffdd;
            backdrop-filter: blur(4px);
            border-radius: 24px;
            border: 1px solid rgba(44,110,158,0.2);
            overflow: hidden;
        }
        .panel-header {
            padding: 14px 16px;
            background: linear-gradient(90deg, #fafdff, #f0f6fe);
            border-bottom: 2px solid #2c6e9e;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 8px;
        }
        .panel-header h2 {
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .pagination-info {
            font-size: 0.7rem;
            color: #5a7a9a;
        }
        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .rank-table {
            min-width: 580px;
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        .rank-table th {
            text-align: left;
            padding: 12px 12px;
            background: #f8fafd;
            font-weight: 600;
            color: #2c5a7a;
            border-bottom: 1px solid #e2edf6;
        }
        .rank-table td {
            padding: 12px 12px;
            border-bottom: 1px solid #ecf3fa;
            cursor: pointer;
            vertical-align: middle;
        }
        .rank-number {
            font-weight: 700;
            color: #3a6b92;
            width: 55px;
        }
        .player-name-cell {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: nowrap;
            white-space: nowrap;
        }
        .player-avatar {
            width: 36px;
            height: 36px;
            background: #eaf3fc;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
            overflow: hidden;
        }
        .player-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .player-id {
            font-size: 0.65rem;
            color: #8aa9c2;
            margin-left: 4px;
            font-weight: normal;
            white-space: nowrap;
        }
        .player-streak {
            background: #e9f0f7;
            padding: 3px 8px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #2c6e9e;
            white-space: nowrap;
        }
        .score-value {
            font-weight: 800;
            font-size: 1rem;
            color: #1e5a88;
        }
        .win-loss {
            font-size: 0.7rem;
            color: #6f8daa;
            white-space: nowrap;
        }
        /* 約戰大廳 & 資訊 */
        .battle-lobby, .info-panel {
            background: #ffffffdd;
            backdrop-filter: blur(4px);
            border-radius: 24px;
            border: 1px solid rgba(44,110,158,0.2);
            overflow: hidden;
        }
        .lobby-header, .info-block h3 {
            padding: 14px 16px;
            background: linear-gradient(90deg, #fafdff, #f0f6fe);
            border-bottom: 2px solid #2c6e9e;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .create-room-btn {
            background: #2c6e9e;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            margin: 16px;
            width: calc(100% - 32px);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .room-list {
            padding: 0 12px 20px;
            max-height: 340px;
            overflow-y: auto;
        }
        .room-card {
            background: #f8fbfe;
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #e2edf6;
        }
        .room-title {
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .room-detail {
            font-size: 0.7rem;
            color: #5a7e9c;
            margin: 8px 0;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .join-btn {
            background: transparent;
            border: 1px solid #2c6e9e;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
        }
        .info-block {
            padding: 0 0 16px 0;
        }
        .rule-list {
            list-style: none;
            padding: 0 16px;
        }
        .rule-list li {
            font-size: 0.75rem;
            padding: 8px 0;
            border-bottom: 1px solid #e9f0f7;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .stat-badge {
            background: #eef3fc;
            border-radius: 20px;
            padding: 12px;
            margin: 12px 16px;
            text-align: center;
        }
        .stat-number {
            font-size: 1.4rem;
            font-weight: 800;
        }
        .double-stats {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        .stat-item {
            flex: 1;
            background: white;
            border-radius: 16px;
            padding: 6px;
        }
        footer {
            margin-top: 28px;
            text-align: center;
            font-size: 0.65rem;
            padding: 16px 0 8px;
            color: #6c8eaa;
            border-top: 1px solid #d4e2f0;
        }
        /* Modal 樣式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-container {
            background: white;
            width: 88%;
            max-width: 400px;
            border-radius: 32px;
            overflow: hidden;
        }
        .modal-header {
            padding: 16px 20px;
            background: #fafdff;
            border-bottom: 2px solid #2c6e9e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-close {
            font-size: 1.6rem;
            background: none;
            border: none;
            cursor: pointer;
        }
        .modal-body {
            padding: 20px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            margin-bottom: 6px;
            font-weight: 600;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #cbdde9;
            border-radius: 40px;
            font-size: 0.9rem;
        }
        .tab-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .tab-btn {
            flex: 1;
            background: #eef2f8;
            border: none;
            padding: 10px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
        }
        .tab-btn.active {
            background: #2c6e9e;
            color: white;
        }
        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }
        .emoji-option {
            font-size: 1.8rem;
            text-align: center;
            cursor: pointer;
            padding: 6px;
            background: #f0f6fc;
            border-radius: 12px;
        }
        .avatar-preview {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #eef2f8;
            margin: 10px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        /* Popup 彈窗 */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
        }
        .popup-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .popup-container {
            background: white;
            width: 88%;
            max-width: 380px;
            border-radius: 32px;
            overflow: hidden;
        }
        .popup-header {
            padding: 16px 20px;
            background: #fafdff;
            border-bottom: 2px solid #2c6e9e;
            display: flex;
            justify-content: space-between;
        }
        .popup-close {
            font-size: 1.6rem;
            background: none;
            border: none;
            cursor: pointer;
        }
        .popup-body {
            padding: 20px;
        }
        .popup-avatar {
            display: flex;
            justify-content: center;
            margin-bottom: 16px;
        }
        .avatar-large {
            width: 80px;
            height: 80px;
            background: #eaf3fc;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            overflow: hidden;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #ecf3fa;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 12px;
        }
        .stat-card {
            background: #f0f6fc;
            padding: 8px;
            text-align: center;
            border-radius: 16px;
            font-size: 0.8rem;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 6px;
            padding: 12px;
            flex-wrap: wrap;
        }
        .page-btn {
            background: transparent;
            border: 1px solid #c0d4e8;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .page-btn.active {
            background: #2c6e9e;
            color: white;
        }
        button, .join-btn, .page-btn {
            touch-action: manipulation;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 頂欄 -->
    <div class="navbar">
        <div class="logo-area">
            <h1><i class="fas fa-bezier-curve"></i> 天馬陀螺戰榜</h1>
            <p>香港街頭對戰 · 即時排名</p>
        </div>
        <button class="menu-btn" id="menuToggleBtn"><span></span><span></span><span></span></button>
    </div>

    <!-- 側邊選單 -->
    <div class="side-menu" id="sideMenu">
        <div class="menu-header">
            <div class="user-icon-large" id="sideUserAvatar">🏆</div>
            <div id="sideUserName">訪客</div>
        </div>
        <ul class="menu-items">
            <li><a id="loginMenuItem"><i class="fas fa-sign-in-alt"></i> 登入 / 註冊</a></li>
            <li><a id="myProfileMenuItem"><i class="fas fa-id-card"></i> 我的檔案</a></li>
            <li><a id="battleHistoryMenuItem"><i class="fas fa-history"></i> 對戰紀錄</a></li>
            <li><a id="scanBattleMenuItem"><i class="fas fa-qrcode"></i> 掃碼對戰</a></li>
            <li><a id="rulesMenuItem"><i class="fas fa-info-circle"></i> 排行榜說明</a></li>
        </ul>
    </div>
    <div class="overlay" id="overlay"></div>

    <!-- 搜尋列 -->
    <div class="search-bar">
        <input type="text" class="search-input" id="searchInput" placeholder="玩家名稱 或 數字ID">
        <button class="search-btn" id="searchBtn"><i class="fas fa-search"></i> 搜尋</button>
        <button class="clear-btn" id="clearSearchBtn"><i class="fas fa-times"></i> 清除</button>
    </div>
    <div id="searchResultInfo" class="search-result-info"></div>

    <div class="dashboard">
        <!-- 排名榜 -->
        <div class="rank-panel">
            <div class="panel-header">
                <h2><i class="fas fa-trophy"></i> 戰士排行</h2>
                <div class="pagination-info" id="paginationInfo">-</div>
            </div>
            <div class="table-wrapper">
                <table class="rank-table" id="rankTable">
                    <thead>
                        <tr><th>排名</th><th>戰士</th><th>積分</th><th>連勝</th><th>戰績</th></tr>
                    </thead>
                    <tbody id="rankTbody"><tr><td colspan="5">載入中...</td></tr></tbody>
                </table>
            </div>
            <div class="pagination" id="paginationControls"></div>
        </div>

        <!-- 約戰大廳 -->
        <div class="battle-lobby">
            <div class="lobby-header"><i class="fas fa-users"></i> 約戰大廳</div>
            <button class="create-room-btn" id="createRoomBtn"><i class="fas fa-plus-circle"></i> 開設陀螺房間</button>
            <div class="room-list" id="roomList">載入中...</div>
        </div>

        <!-- 規則資訊 -->
        <div class="info-panel">
            <div class="info-block">
                <h3><i class="fas fa-dice-d6"></i> 積分規則</h3>
                <ul class="rule-list">
                    <li><i class="fas fa-star"></i> 初始1000分</li>
                    <li><i class="fas fa-bolt"></i> 勝者奪敗者10% (上限150)</li>
                    <li><i class="fas fa-shield-alt"></i> 新手保護 ≤500分扣5%</li>
                    <li><i class="fas fa-clock"></i> 同一對手24hr一次</li>
                    <li><i class="fas fa-fire"></i> 連勝加成: 3連勝+2%</li>
                </ul>
                <div class="stat-badge">
                    <div class="stat-number" id="totalPlayersCount">0</div>
                    <div>活躍鬥士</div>
                    <div class="double-stats">
                        <div class="stat-item"><div class="stat-number" id="highestStreak">0</div><div>最高連勝</div></div>
                        <div class="stat-item"><div class="stat-number" id="weeklyChampion">-</div><div>陀螺王</div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer><i class="fas fa-bezier-curve"></i> 香港爆旋陀螺協會 · 公平競技</footer>
</div>

<!-- 玩家詳細 Popup -->
<div class="popup-overlay" id="popupOverlay">
    <div class="popup-container">
        <div class="popup-header"><h3 id="popupName">玩家</h3><button class="popup-close" id="popupCloseBtn">&times;</button></div>
        <div class="popup-body" id="popupBody"></div>
    </div>
</div>

<!-- 登入/註冊 Modal -->
<div class="modal-overlay" id="authModal">
    <div class="modal-container">
        <div class="modal-header"><h3>帳號</h3><button class="modal-close" id="closeAuthBtn">&times;</button></div>
        <div class="modal-body">
            <div class="tab-buttons">
                <button class="tab-btn active" id="loginTabBtn">登入</button>
                <button class="tab-btn" id="registerTabBtn">註冊</button>
            </div>
            <div id="loginForm">
                <div class="form-group">
                    <label>玩家ID (5位數字)</label>
                    <input type="text" id="loginId" placeholder="例如 12345" maxlength="5">
                </div>
                <div class="form-group">
                    <label>密碼</label>
                    <input type="password" id="loginPassword" placeholder="密碼">
                </div>
                <button id="doLoginBtn" style="width:100%; background:#2c6e9e; color:white; padding:10px; border:none; border-radius:40px;">登入</button>
                <div style="margin-top:12px; text-align:center;">
                    <button id="googleLoginBtn" style="background:#4285F4; color:white; border:none; border-radius:40px; padding:8px 16px;"><i class="fab fa-google"></i> Google 登入</button>
                </div>
                <div class="login-hint" style="font-size:0.7rem; text-align:center; margin-top:12px;">未註冊？請切換至「註冊」建立新帳號</div>
            </div>
            <div id="registerForm" style="display:none;">
                <div class="form-group">
                    <label>戰士名稱</label>
                    <input type="text" id="regName" placeholder="例如 天馬戰士">
                </div>
                <div class="form-group">
                    <label>活躍區域</label>
                    <select id="regDistrict">
                        <option>觀塘區</option><option>油尖旺區</option><option>深水埗區</option><option>九龍城區</option>
                        <option>黃大仙區</option><option>葵青區</option><option>荃灣區</option><option>屯門區</option>

<!-- 簡易 Toast 提示 -->
<div id="toastMessage" class="toast"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, getDoc, getDocs, query, orderBy, limit, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyALCq_eK__C_YD-MgMeQAL1enqeMF4hQG4",
        authDomain: "goshoot-ac397.firebaseapp.com",
        projectId: "goshoot-ac397",
        storageBucket: "goshoot-ac397.firebasestorage.app",
        messagingSenderId: "251450080441",
        appId: "1:251450080441:web:613567f18a19a828bcef68",
        measurementId: "G-25J4M3QZPN"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // ---------- 全域變數 ----------
    let currentUser = null;          // 儲存登入後的完整玩家資料 (含 id, name, player_number, avatar, district, score...)
    let allPlayers = [];
    let filteredPlayers = [];
    let currentPage = 1;
    const itemsPerPage = 15;
    let currentSearchTerm = "";

    // DOM 元素 (需等待載入)
    let rankTbody, searchInput, searchBtn, clearBtn, paginationControls, paginationInfo;
    let totalPlayersSpan, highestStreakSpan, weeklyChampionSpan;
    let sideUserAvatar, sideUserName, loginMenuItem;
    let authModal, loginForm, registerForm, loginIdInput, loginPasswordInput, doLoginBtn, googleLoginBtn;
    let regNameInput, regDistrictSelect, regPasswordInput, doRegisterBtn, regGoogleBtn;
    let profileModal, profileAvatarPreview, profileDistrictSelect, saveProfileBtn;
    let popupOverlay, popupName, popupBody, popupCloseBtn;
    let createRoomBtn, roomList;

    // 輔助函數：顯示 Toast 訊息
    function showToast(msg, isError = false) {
        const toast = document.getElementById("toastMessage");
        if (!toast) return;
        toast.textContent = msg;
        toast.style.background = isError ? "#c0392b" : "#1e2a3a";
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 3000);
    }

    // 顯示 loading 按鈕狀態 (簡單實現)
    function setButtonLoading(btn, isLoading) {
        if (!btn) return;
        if (isLoading) {
            btn.dataset.originalText = btn.innerHTML;
            btn.innerHTML = '<span class="loading-spinner"></span> 處理中';
            btn.disabled = true;
        } else {
            btn.innerHTML = btn.dataset.originalText || btn.innerHTML;
            btn.disabled = false;
        }
    }

    // ---------- Firebase 玩家資料同步 ----------
    async function getOrCreatePlayer(firebaseUser) {
        const playerRef = doc(db, "players", firebaseUser.uid);
        const docSnap = await getDoc(playerRef);
        if (docSnap.exists()) {
            return { id: firebaseUser.uid, ...docSnap.data() };
        } else {
            // 新用戶：建立玩家資料
            const numericId = Math.floor(10000 + Math.random() * 90000);
            const displayName = firebaseUser.displayName || (firebaseUser.email ? firebaseUser.email.split('@')[0] : "新戰士");
            const newPlayer = {
                player_number: numericId,
                name: displayName,
                avatar: firebaseUser.photoURL || "🏆",
                district: "觀塘區",
                score: 1000,
                streak: 0,
                wins: 0,
                losses: 0,
                ties: 0,
                email: firebaseUser.email
            };
            await setDoc(playerRef, newPlayer);
            return { id: firebaseUser.uid, ...newPlayer };
        }
    }

    async function loadRankings() {
        try {
            const q = query(collection(db, "players"), orderBy("score", "desc"), limit(200));
            const querySnapshot = await getDocs(q);
            allPlayers = [];
            querySnapshot.forEach(doc => {
                allPlayers.push({ id: doc.id, ...doc.data() });
            });
            filteredPlayers = [...allPlayers];
            renderRanking();
        } catch (err) {
            console.error("載入排行榜失敗", err);
            showToast("載入排行榜失敗，請檢查網路", true);
        }
    }

    async function updatePlayerProfile(avatar, district) {
        if (!currentUser) return;
        const playerRef = doc(db, "players", currentUser.id);
        await updateDoc(playerRef, { avatar, district });
        currentUser.avatar = avatar;
        currentUser.district = district;
        updateSidebarUI();
        loadRankings(); // 刷新排行榜
        showToast("檔案已更新");
    }

    // 登出 (帶確認)
    async function logout() {
        if (confirm("確定要登出嗎？")) {
            await signOut(auth);
            showToast("已登出");
        }
    }

    // Email/密碼登入
    async function doLogin() {
        const numericId = loginIdInput.value.trim();
        const password = loginPasswordInput.value;
        if (!numericId || !password) {
            showToast("請輸入數字ID和密碼", true);
            return;
        }
        const email = numericId + "@gyro.local";
        setButtonLoading(doLoginBtn, true);
        try {
            await signInWithEmailAndPassword(auth, email, password);
            closeAuthModal();
            showToast("登入成功");
        } catch (error) {
            let msg = "登入失敗";
            if (error.code === 'auth/user-not-found') msg = "找不到此玩家ID";
            else if (error.code === 'auth/wrong-password') msg = "密碼錯誤";
            else if (error.code === 'auth/invalid-email') msg = "ID格式錯誤";
            showToast(msg, true);
        } finally {
            setButtonLoading(doLoginBtn, false);
        }
    }

    // Google 登入 (彈出視窗)
    async function googleLogin() {
        setButtonLoading(googleLoginBtn, true);
        try {
            const result = await signInWithPopup(auth, provider);
            // 登入成功後 onAuthStateChanged 會自動處理
            closeAuthModal();
            showToast(`歡迎，${result.user.displayName || "玩家"}`);
        } catch (error) {
            console.error(error);
            let msg = "Google 登入失敗";
            if (error.code === 'auth/popup-closed-by-user') msg = "您關閉了彈窗，請重新嘗試";
            else if (error.code === 'auth/account-exists-with-different-credential') msg = "此電子郵件已使用其他方式註冊";
            showToast(msg, true);
        } finally {
            setButtonLoading(googleLoginBtn, false);
        }
    }

    // 註冊 (Email/密碼)
    async function doRegister() {
        const name = regNameInput.value.trim();
        const district = regDistrictSelect.value;
        const password = regPasswordInput.value;
        if (!name || !password) {
            showToast("請填寫名稱和密碼", true);
            return;
        }
        if (password.length < 6) {
            showToast("密碼至少 6 位", true);
            return;
        }
        const numericId = Math.floor(10000 + Math.random() * 90000);
        const email = numericId + "@gyro.local";
        setButtonLoading(doRegisterBtn, true);
        try {
            const userCred = await createUserWithEmailAndPassword(auth, email, password);
            const uid = userCred.user.uid;
            const newPlayer = {
                player_number: numericId,
                name: name,
                avatar: selectedRegAvatar || "🏆",
                district: district,
                score: 1000,
                streak: 0,
                wins: 0,
                losses: 0,
                ties: 0,
                email: email
            };
            await setDoc(doc(db, "players", uid), newPlayer);
            showToast(`註冊成功！您的玩家ID是 ${numericId}，請用此ID登入`);
            switchAuthTab('login');
            // 清空表單
            regNameInput.value = "";
            regPasswordInput.value = "";
        } catch (error) {
            let msg = "註冊失敗";
            if (error.code === 'auth/email-already-in-use') msg = "此ID已被使用，請重新註冊";
            showToast(msg, true);
        } finally {
            setButtonLoading(doRegisterBtn, false);
        }
    }

    // 註冊表單中的 Google 註冊 (實際上就是 Google 登入，但為了UX明確)
    async function registerWithGoogle() {
        await googleLogin();
    }

    // ---------- UI 更新 ----------
    function updateSidebarUI() {
        if (currentUser) {
            const av = currentUser.avatar;
            if (av && (av.startsWith("http") || av.startsWith("data:image"))) {
                sideUserAvatar.innerHTML = `<img src="${av}" alt="avatar">`;
            } else {
                sideUserAvatar.innerHTML = av || "🏆";
            }
            sideUserName.innerText = currentUser.name;
            loginMenuItem.innerHTML = '<i class="fas fa-sign-out-alt"></i> 登出';
        } else {
            sideUserAvatar.innerHTML = "🏆";
            sideUserName.innerText = "訪客";
            loginMenuItem.innerHTML = '<i class="fas fa-sign-in-alt"></i> 登入 / 註冊';
        }
    }

    // 監聽 Auth 狀態變化 (現代化即時更新)
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            // 登入或註冊後，取得 / 更新玩家資料
            currentUser = await getOrCreatePlayer(user);
            updateSidebarUI();
            // 若排行榜尚未載入則載入，否則重新整理以顯示自己的資料
            if (allPlayers.length === 0) await loadRankings();
            else loadRankings(); // 刷新確保個人分數正確
            // 關閉任何開啟的 modal
            closeAuthModal();
            closeProfileModal();
        } else {
            currentUser = null;
            updateSidebarUI();
            // 不清空排行榜，讓訪客仍可瀏覽
        }
    });

    // 初次載入排行榜
    loadRankings();

    // 其餘 UI 事件綁定 (與之前類似，但確保 Google 按鈕正確)
    document.addEventListener('DOMContentLoaded', () => {
        // 取得所有元素 (與之前相同)
        rankTbody = document.getElementById("rankTbody");
        searchInput = document.getElementById("searchInput");
        searchBtn = document.getElementById("searchBtn");
        clearBtn = document.getElementById("clearSearchBtn");
        paginationControls = document.getElementById("paginationControls");
        paginationInfo = document.getElementById("paginationInfo");
        totalPlayersSpan = document.getElementById("totalPlayersCount");
        highestStreakSpan = document.getElementById("highestStreak");
        weeklyChampionSpan = document.getElementById("weeklyChampion");
        sideUserAvatar = document.getElementById("sideUserAvatar");
        sideUserName = document.getElementById("sideUserName");
        loginMenuItem = document.getElementById("loginMenuItem");
        authModal = document.getElementById("authModal");
        loginForm = document.getElementById("loginForm");
        registerForm = document.getElementById("registerForm");
        loginIdInput = document.getElementById("loginId");
        loginPasswordInput = document.getElementById("loginPassword");
        doLoginBtn = document.getElementById("doLoginBtn");
        googleLoginBtn = document.getElementById("googleLoginBtn");
        regNameInput = document.getElementById("regName");
        regDistrictSelect = document.getElementById("regDistrict");
        regPasswordInput = document.getElementById("regPassword");
        doRegisterBtn = document.getElementById("doRegisterBtn");
        regGoogleBtn = document.getElementById("regGoogleBtn");
        profileModal = document.getElementById("profileModal");
        profileAvatarPreview = document.getElementById("profileAvatarPreview");
        profileDistrictSelect = document.getElementById("profileDistrict");
        saveProfileBtn = document.getElementById("saveProfileBtn");
        popupOverlay = document.getElementById("popupOverlay");
        popupName = document.getElementById("popupName");
        popupBody = document.getElementById("popupBody");
        popupCloseBtn = document.getElementById("popupCloseBtn");
        createRoomBtn = document.getElementById("createRoomBtn");
        roomList = document.getElementById("roomList");

        // 綁定事件
        searchBtn.addEventListener("click", () => searchPlayers(searchInput.value));
        clearBtn.addEventListener("click", () => { searchInput.value = ""; searchPlayers(""); });
        searchInput.addEventListener("keypress", (e) => { if (e.key === "Enter") searchPlayers(searchInput.value); });
        loginMenuItem.addEventListener("click", (e) => { e.preventDefault(); if (currentUser) logout(); else openAuthModal(); closeMenu(); });
        document.getElementById("myProfileMenuItem")?.addEventListener("click", (e) => { e.preventDefault(); openProfileModal(); closeMenu(); });
        document.getElementById("battleHistoryMenuItem")?.addEventListener("click", () => { alert("對戰紀錄開發中"); closeMenu(); });
        document.getElementById("scanBattleMenuItem")?.addEventListener("click", () => { if (!currentUser) showToast("請先登入", true); else alert("掃碼對戰開發中"); closeMenu(); });
        document.getElementById("rulesMenuItem")?.addEventListener("click", () => { alert("排行榜說明：\n- 初始1000分\n- 勝者奪敗者10%積分..."); closeMenu(); });
        createRoomBtn.addEventListener("click", () => { if (!currentUser) showToast("請先登入", true); else alert("開設房間功能開發中"); });
        renderRooms();

        // Modal 控制
        document.getElementById("closeAuthBtn").addEventListener("click", closeAuthModal);
        authModal.addEventListener("click", (e) => { if (e.target === authModal) closeAuthModal(); });
        document.getElementById("loginTabBtn").addEventListener("click", () => switchAuthTab('login'));
        document.getElementById("registerTabBtn").addEventListener("click", () => switchAuthTab('register'));
        doLoginBtn.addEventListener("click", doLogin);
        googleLoginBtn.addEventListener("click", googleLogin);
        doRegisterBtn.addEventListener("click", doRegister);
        if (regGoogleBtn) regGoogleBtn.addEventListener("click", registerWithGoogle);

        document.getElementById("closeProfileBtn").addEventListener("click", closeProfileModal);
        profileModal.addEventListener("click", (e) => { if (e.target === profileModal) closeProfileModal(); });
        saveProfileBtn.addEventListener("click", saveProfile);
        popupCloseBtn.addEventListener("click", closePopup);
        popupOverlay.addEventListener("click", (e) => { if (e.target === popupOverlay) closePopup(); });

        const menuBtn = document.getElementById("menuToggleBtn");
        const sideMenu = document.getElementById("sideMenu");
        const overlay = document.getElementById("overlay");
        menuBtn.addEventListener("click", () => { sideMenu.classList.add("open"); overlay.classList.add("active"); });
        overlay.addEventListener("click", () => { sideMenu.classList.remove("open"); overlay.classList.remove("active"); });

        // 頭像選擇器初始化 (函數內容與之前相同)
        setupRegisterEmoji();
        setupProfileEmoji();
    });

    // 以下函數與上一版基本相同，但確保 Toast 整合
    function showPlayerPopup(player) { /* 同前 */ }
    function renderRanking() { /* 同前 */ }
    function renderPagination() { /* 同前 */ }
    function searchPlayers(term) { /* 同前 */ }
    function openAuthModal() { authModal.classList.add("active"); }
    function closeAuthModal() { authModal.classList.remove("active"); }
    function switchAuthTab(tab) { /* 同前 */ }
    function openProfileModal() { /* 同前 */ }
    function closeProfileModal() { profileModal.classList.remove("active"); }
    async function saveProfile() { /* 同前 */ }
    function setupRegisterEmoji() { /* 同前 */ }
    function setupProfileEmoji() { /* 同前 */ }
    function renderRooms() { /* 同前 */ }
    function closeMenu() { /* 同前 */ }
    // 為避免遺漏，請你將上一版中對應的函數實作貼在此處，或直接複製完整程式碼。
    // 由於長度限制，此處提供最關鍵的修正點，實際使用時請將我上一則回應中的完整 <script> 區塊替換為上述改良版。
</script>
